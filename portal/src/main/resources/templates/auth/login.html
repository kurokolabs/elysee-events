<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Anmelden - Élysée Events Portal</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .demo-section {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid rgba(201,168,76,.12);
    }
    .demo-section__title {
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      margin-bottom: 16px;
    }
    .demo-buttons { display: flex; gap: 10px; }
    .demo-btn {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 16px 12px;
      background: var(--surface);
      border: 1px solid rgba(201,168,76,.15);
      border-radius: 2px;
      cursor: pointer;
      transition: all .3s cubic-bezier(0.22,1,0.36,1);
      font-family: 'DM Sans', sans-serif;
    }
    .demo-btn:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201,168,76,.12);
    }
    .demo-btn.is-active {
      background: var(--gold);
      border-color: var(--gold);
    }
    .demo-btn.is-active .demo-btn__label,
    .demo-btn.is-active .demo-btn__hint { color: #0a0a0a; }
    .demo-btn__icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-weight: 600;
      letter-spacing: .03em;
    }
    .demo-btn--admin .demo-btn__icon { background: var(--dark); color: var(--gold); }
    .demo-btn--customer .demo-btn__icon { background: var(--gold); color: var(--white); }
    .demo-btn__label {
      font-size: 10px; font-weight: 600;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--dark);
    }
    .demo-btn__hint { font-size: 11px; color: var(--muted); font-weight: 400; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">
        <div class="login-card__monogram">ÉE</div>
      </div>
      <h1 class="login-card__title">Kundenportal</h1>

      <div th:if="${param.error}" class="alert alert--error">E-Mail oder Passwort ist falsch.</div>
      <div th:if="${param.logout}" class="alert alert--success">Sie wurden erfolgreich abgemeldet.</div>

      <form th:action="@{/portal/login}" method="post" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">E-Mail</label>
          <input type="email" id="username" name="username" class="form-input"
                 placeholder="ihre@email.de" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Passwort</label>
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="Ihr Passwort" required>
        </div>
        <button type="submit" class="btn btn--gold" id="submitBtn">Anmelden</button>
      </form>

      <div class="demo-section">
        <div class="demo-section__title">Demo-Zugänge</div>
        <div class="demo-buttons">
          <button type="button" class="demo-btn demo-btn--admin" id="demoAdmin"
                  data-email="admin@elysee-events.de" data-pw="Admin2024!">
            <div class="demo-btn__icon">A</div>
            <div class="demo-btn__label">Admin</div>
            <div class="demo-btn__hint">Verwaltung</div>
          </button>
          <button type="button" class="demo-btn demo-btn--customer" id="demoCustomer"
                  data-email="demo@elysee-events.de" data-pw="Demo2024!">
            <div class="demo-btn__icon">K</div>
            <div class="demo-btn__label">Kunde</div>
            <div class="demo-btn__hint">Sophie Meier</div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('loginForm');
      var emailInput = document.getElementById('username');
      var pwInput = document.getElementById('password');

      document.querySelectorAll('.demo-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var email = this.getAttribute('data-email');
          var pw = this.getAttribute('data-pw');

          emailInput.value = email;
          pwInput.value = pw;
          this.classList.add('is-active');

          setTimeout(function() {
            form.submit();
          }, 250);
        });
      });
    });
  </script>
</body>
</html>
