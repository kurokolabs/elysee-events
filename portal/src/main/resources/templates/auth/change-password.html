<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passwort ändern - Elysee Events Portal</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">
        <div class="login-card__monogram">EE</div>
      </div>
      <h1 class="login-card__title">Passwort ändern</h1>

      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>

      <form th:action="@{/portal/passwort-aendern}" method="post">
        <div class="form-group">
          <label class="form-label" for="currentPassword">Aktuelles Passwort</label>
          <input type="password" id="currentPassword" name="currentPassword" class="form-input" required autocomplete="current-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="newPassword">Neues Passwort</label>
          <input type="password" id="newPassword" name="newPassword" class="form-input"
                 minlength="8" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Passwort bestätigen</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                 minlength="8" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn--gold">Passwort ändern</button>
      </form>
    </div>
  </div>
</body>
</html>
