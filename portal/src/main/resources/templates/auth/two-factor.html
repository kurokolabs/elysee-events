<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Zwei-Faktor-Authentifizierung - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .twofa-code-inputs {
      display: flex; gap: 8px; justify-content: center; margin: 24px 0;
    }
    .twofa-code-inputs input {
      width: 48px; height: 56px;
      text-align: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 500;
      color: var(--dark);
      background: var(--white);
      border: 1px solid rgba(201,168,76,.25);
      border-radius: 2px;
      outline: none;
      transition: border-color .25s ease, box-shadow .25s ease, transform .2s ease;
    }
    .twofa-code-inputs input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,.1);
      transform: translateY(-2px);
    }
    .twofa-code-inputs input.filled {
      border-color: var(--gold);
      background: rgba(201,168,76,.04);
    }
    .twofa-info {
      text-align: center;
      font-size: 14px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .twofa-email {
      font-weight: 500;
      color: var(--dark);
    }
    .twofa-resend {
      text-align: center;
      margin-top: 20px;
    }
    .twofa-resend button {
      background: none; border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px; color: var(--muted);
      cursor: pointer;
      transition: color .25s ease;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .twofa-resend button:hover { color: var(--gold); }
    .twofa-resend button:disabled { opacity: .4; cursor: default; }
    .twofa-timer {
      font-size: 12px; color: var(--muted);
      text-align: center; margin-top: 8px;
    }
    #hiddenCode { position: absolute; left: -9999px; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card" style="max-width:440px;">
      <div class="login-card__logo">
        <div class="login-card__monogram">EE</div>
      </div>
      <h1 class="login-card__title" style="font-size:24px;">Verifizierung</h1>

      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>

      <p class="twofa-info">
        Ein 6-stelliger Code wurde an<br>
        <span class="twofa-email" th:text="${email}">user@example.de</span><br>
        gesendet.
      </p>

      <form th:action="@{/portal/2fa}" method="post" id="twoFaForm">
        <input type="hidden" name="code" id="hiddenCode">
        <div class="twofa-code-inputs">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="0" aria-label="Code Ziffer 1" autofocus>
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="1" aria-label="Code Ziffer 2">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="2" aria-label="Code Ziffer 3">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="3" aria-label="Code Ziffer 4">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="4" aria-label="Code Ziffer 5">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" class="code-digit" data-index="5" aria-label="Code Ziffer 6">
        </div>

        <button type="submit" class="btn btn--gold" style="width:100%;" id="verifyBtn" disabled>Code pruefen</button>
      </form>

      <div class="twofa-resend">
        <form th:action="@{/portal/2fa/resend}" method="post" style="display:inline;">
          <button type="submit" id="resendBtn">Code erneut senden</button>
        </form>
      </div>
      <div class="twofa-timer" id="timerDisplay"></div>

      <div style="text-align:center; margin-top:24px;">
        <form th:action="@{/portal/logout}" method="post" style="display:inline;"><button type="submit" style="background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit;text-decoration:underline;text-underline-offset:3px;">Abbrechen und abmelden</button></form>
      </div>
    </div>
  </div>

  <script>
    var digits = document.querySelectorAll('.code-digit');
    var hiddenCode = document.getElementById('hiddenCode');
    var verifyBtn = document.getElementById('verifyBtn');

    function updateHiddenCode() {
      var code = '';
      digits.forEach(function(d) { code += d.value; });
      hiddenCode.value = code;
      verifyBtn.disabled = code.length < 6;
    }

    digits.forEach(function(input, idx) {
      input.addEventListener('input', function(e) {
        var val = this.value.replace(/[^0-9]/g, '');
        this.value = val.charAt(0) || '';
        if (val && idx < 5) {
          digits[idx + 1].focus();
        }
        this.classList.toggle('filled', !!this.value);
        updateHiddenCode();

        if (idx === 5 && this.value) {
          updateHiddenCode();
          if (hiddenCode.value.length === 6) {
            setTimeout(function() { document.getElementById('twoFaForm').submit(); }, 200);
          }
        }
      });

      input.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && idx > 0) {
          digits[idx - 1].focus();
          digits[idx - 1].value = '';
          digits[idx - 1].classList.remove('filled');
          updateHiddenCode();
        }
      });

      input.addEventListener('paste', function(e) {
        e.preventDefault();
        var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
        for (var i = 0; i < Math.min(paste.length, 6); i++) {
          digits[i].value = paste.charAt(i);
          digits[i].classList.add('filled');
        }
        if (paste.length >= 6) digits[5].focus();
        else if (paste.length > 0) digits[Math.min(paste.length, 5)].focus();
        updateHiddenCode();
        if (hiddenCode.value.length === 6) {
          setTimeout(function() { document.getElementById('twoFaForm').submit(); }, 200);
        }
      });
    });

    var timerSeconds = 600;
    var timerEl = document.getElementById('timerDisplay');

    function updateTimer() {
      if (timerSeconds <= 0) {
        timerEl.textContent = 'Code abgelaufen.';
        verifyBtn.disabled = true;
        return;
      }
      var min = Math.floor(timerSeconds / 60);
      var sec = timerSeconds % 60;
      timerEl.textContent = 'Code gueltig fuer ' + min + ':' + (sec < 10 ? '0' : '') + sec;
      timerSeconds--;
      setTimeout(updateTimer, 1000);
    }

    document.addEventListener('DOMContentLoaded', function() {
      updateTimer();
      digits[0].focus();
    });
  </script>
</body>
</html>
