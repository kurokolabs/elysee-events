<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Konto erstellen - Élysée Events Portal</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .auth-nav { position:fixed; top:0; left:0; right:0; height:68px; background:linear-gradient(180deg,rgba(8,8,7,.97) 0%,rgba(14,13,12,.94) 100%); backdrop-filter:blur(32px) saturate(180%); -webkit-backdrop-filter:blur(32px) saturate(180%); z-index:9000; }
    .auth-nav::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent 0%,#C9A84C 15%,#e8d48b 50%,#C9A84C 85%,transparent 100%); opacity:.6; }
    .auth-nav__inner { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; height:100%; padding:0 20px; }
    .auth-nav__logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .auth-nav__monogram { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:1px solid rgba(201,168,76,.4); border-radius:8px; font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600; font-style:italic; color:#C9A84C; flex-shrink:0; }
    .auth-nav__text { font-family:'Cormorant Garamond',serif; font-size:15px; font-style:italic; letter-spacing:.06em; color:rgba(255,255,255,.85); }
    .login-page { padding-top:68px; }
    .pw-hint { font-size:11px; color:var(--muted); margin-top:4px; line-height:1.5; }
    .login-link { text-align:center; margin-top:20px; font-size:13px; color:var(--muted); }
    .login-link a { color:var(--gold); text-decoration:underline; text-underline-offset:3px; }
  </style>
</head>
<body>
  <nav class="auth-nav">
    <div class="auth-nav__inner">
      <a href="/" class="auth-nav__logo">
        <div class="auth-nav__monogram">&#201;E</div>
        <span class="auth-nav__text">Élysée Events</span>
      </a>
    </div>
  </nav>
  <div class="login-page">
    <div class="login-card">
      <div class="login-card__logo">
        <div class="login-card__monogram">&#201;E</div>
      </div>
      <h1 class="login-card__title">Konto erstellen</h1>

      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <form th:action="@{/portal/register}" method="post">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div class="form-group">
            <label class="form-label" for="firstName">Vorname *</label>
            <input type="text" id="firstName" name="firstName" class="form-input"
                   placeholder="Vorname" required autofocus
                   th:value="${firstName}">
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Nachname *</label>
            <input type="text" id="lastName" name="lastName" class="form-input"
                   placeholder="Nachname" required
                   th:value="${lastName}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="company">Firma</label>
          <input type="text" id="company" name="company" class="form-input"
                 placeholder="Firma (optional)"
                 th:value="${company}">
        </div>
        <div class="form-group">
          <label class="form-label" for="email">E-Mail *</label>
          <input type="email" id="email" name="email" class="form-input"
                 placeholder="ihre@email.de" required
                 th:value="${email}">
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Passwort *</label>
          <input type="password" id="password" name="password" class="form-input"
                 placeholder="Ihr Passwort" required minlength="8" autocomplete="new-password">
          <p class="pw-hint">Mind. 8 Zeichen, Groß-/Kleinbuchstaben, Zahl und Sonderzeichen</p>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Passwort wiederholen</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                 placeholder="Passwort bestätigen" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn--gold">Konto erstellen</button>
      </form>

      <div class="login-link">
        Bereits ein Konto? <a th:href="@{/portal/login}">Anmelden</a>
      </div>

      <div style="text-align:center; margin-top:12px;">
        <a href="/" style="font-size:12px; color:rgba(107,101,96,.6); text-decoration:none;">Zurück zur Website</a>
      </div>
    </div>
  </div>
</body>
</html>
