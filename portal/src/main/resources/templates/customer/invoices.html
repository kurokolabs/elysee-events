<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meine Rechnungen - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: customer-topnav}"></div>
  <main class="portal-main">
    <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <div class="portal-header">
      <h1 class="portal-header__title">Meine Rechnungen</h1>
      <p class="portal-header__subtitle" th:text="${#lists.size(invoices)} + ' Rechnungen'">0 Rechnungen</p>
    </div>

    <div th:if="${#lists.isEmpty(invoices)}" class="empty-state">
      <div class="empty-state__title">Keine Rechnungen vorhanden</div>
      <div class="empty-state__text">Es liegen derzeit keine Rechnungen für Sie vor.</div>
    </div>

    <div class="table-wrap" th:if="${!#lists.isEmpty(invoices)}">
      <table class="data-table">
        <thead>
          <tr>
            <th>Nr.</th>
            <th>Buchungstyp</th>
            <th>Betrag</th>
            <th>MwSt.</th>
            <th>Gesamt</th>
            <th>Fällig am</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="inv : ${invoices}">
            <td><a th:href="@{/portal/rechnung/{id}(id=${inv.id})}" th:text="${inv.invoiceNumber}">RE-001</a></td>
            <td th:text="${inv.bookingTypeLabel}">Hochzeit</td>
            <td th:text="${#numbers.formatDecimal(inv.amount, 0, 'COMMA', 2, 'POINT')} + ' EUR'">1.000,00 EUR</td>
            <td th:text="${#numbers.formatDecimal(inv.taxAmount, 0, 'COMMA', 2, 'POINT')} + ' EUR'">190,00 EUR</td>
            <td th:text="${#numbers.formatDecimal(inv.total, 0, 'COMMA', 2, 'POINT')} + ' EUR'">1.190,00 EUR</td>
            <td th:text="${inv.dueDate != null ? @dateUtil.format(inv.dueDate) : '-'}">2024-07-01</td>
            <td>
              <span class="status-badge"
                    th:classappend="'status-badge--' + ${inv.status}"
                    th:text="${inv.status}">OFFEN</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
