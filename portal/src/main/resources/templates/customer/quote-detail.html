<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="'Angebot ' + ${quote.quoteNumber} + ' - Elysee Events'">Angebot - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: customer-topnav}"></div>
  <main class="portal-main">
    <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <div class="portal-header">
      <h1 class="portal-header__title" th:text="'Angebot ' + ${quote.quoteNumber}">Angebot AN-001</h1>
      <div class="portal-header__actions">
        <a th:href="@{/portal/angebote}" class="btn btn--outline btn--sm">Zur&uuml;ck zur &Uuml;bersicht</a>
        <a th:href="@{/portal/angebot/{id}/pdf(id=${quote.id})}" class="btn btn--gold btn--sm">PDF herunterladen</a>
        <form th:if="${quote.status == 'OFFEN'}" th:action="@{/portal/angebot/{id}/annehmen(id=${quote.id})}" method="post" style="display:inline;">
          <button type="submit" class="btn btn--gold btn--sm">Angebot annehmen</button>
        </form>
      </div>
    </div>

    <div style="margin-bottom:24px;">
      <span class="status-badge"
            th:classappend="'status-badge--' + ${quote.status}"
            th:text="${quote.status}"
            style="font-size:12px; padding:8px 20px;">OFFEN</span>
    </div>

    <!-- Positionen -->
    <div class="detail-card" style="margin-bottom:24px;" th:if="${items != null and !items.isEmpty()}">
      <div class="detail-card__title">Positionen</div>
      <table class="data-table">
        <thead>
          <tr><th>Position</th><th>Menge</th><th style="text-align:right">Einzelpreis</th><th style="text-align:right">Betrag</th></tr>
        </thead>
        <tbody>
          <tr th:each="item : ${items}">
            <td th:text="${item.description}">Saalmiete</td>
            <td th:text="${#numbers.formatDecimal(item.quantity, 0, 'COMMA', 2, 'POINT')}">1</td>
            <td style="text-align:right" th:text="${#numbers.formatDecimal(item.unitPrice, 0, 'COMMA', 2, 'POINT')} + ' EUR'">500,00 EUR</td>
            <td style="text-align:right" th:text="${#numbers.formatDecimal(item.total, 0, 'COMMA', 2, 'POINT')} + ' EUR'">500,00 EUR</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-card__title">Betr&auml;ge</div>
        <div class="detail-field">
          <div class="detail-field__label">Netto</div>
          <div class="detail-field__value" th:text="${#numbers.formatDecimal(quote.amount, 0, 'COMMA', 2, 'POINT')} + ' EUR'">0,00 EUR</div>
        </div>
        <div class="detail-field">
          <div class="detail-field__label" th:text="'MwSt. ' + ${#numbers.formatDecimal(quote.taxRate, 0, 'COMMA', 1, 'POINT')} + ' %'">MwSt. 19,0 %</div>
          <div class="detail-field__value" th:text="${#numbers.formatDecimal(quote.taxAmount, 0, 'COMMA', 2, 'POINT')} + ' EUR'">0,00 EUR</div>
        </div>
        <div class="detail-field" style="border-top:2px solid var(--gold); padding-top:12px; margin-top:8px;">
          <div class="detail-field__label">Gesamtbetrag</div>
          <div class="detail-field__value" style="font-size:22px; font-family:'Cormorant Garamond',serif; color:var(--gold);"
               th:text="${#numbers.formatDecimal(quote.total, 0, 'COMMA', 2, 'POINT')} + ' EUR'">0,00 EUR</div>
        </div>
        <div class="detail-field" style="margin-top:16px;">
          <div class="detail-field__label">G&uuml;ltig bis</div>
          <div class="detail-field__value" th:text="${quote.validUntil ?: '-'}">-</div>
        </div>
      </div>

      <div class="detail-card">
        <div class="detail-card__title">Hinweise</div>
        <div class="detail-field" th:if="${quote.notes != null and !quote.notes.isEmpty()}">
          <div class="detail-field__label">Notizen</div>
          <div class="detail-field__value" th:text="${quote.notes}">-</div>
        </div>
        <div class="detail-field" th:if="${quote.notes == null or quote.notes.isEmpty()}">
          <div class="detail-field__value" style="color:var(--muted);">Keine Hinweise vorhanden.</div>
        </div>
        <div class="detail-field">
          <div class="detail-field__label">Erstellt am</div>
          <div class="detail-field__value" th:text="${quote.createdAt}">-</div>
        </div>
      </div>
    </div>
  </main>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
