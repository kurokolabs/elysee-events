<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .dash-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .dash-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 20px 12px;
      background: #fff;
      border: 1px solid rgba(26,26,26,.08);
      border-radius: 12px;
      text-decoration: none;
      transition: all .25s ease;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .dash-action:hover {
      background: rgba(201,168,76,.06);
      border-color: rgba(201,168,76,.3);
      box-shadow: 0 2px 8px rgba(201,168,76,.1);
    }
    .dash-action__icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: rgba(201,168,76,.1);
      color: #C9A84C;
    }
    .dash-action__icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .dash-action__label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #6B6560;
      text-align: center;
    }
    .dash-action--primary {
      background: rgba(201,168,76,.08);
      border-color: rgba(201,168,76,.25);
    }
    .dash-action--primary .dash-action__label {
      color: #C9A84C;
    }

    .dash-section {
      margin-bottom: 28px;
    }
    .dash-section__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .dash-section__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: #1A1A1A;
      letter-spacing: .04em;
    }
    .dash-section__link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(201,168,76,.6);
      text-decoration: none;
      transition: color .2s ease;
    }
    .dash-section__link:hover {
      color: #C9A84C;
    }
    .dash-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 13px;
      color: #6B6560;
      border: 1px dashed rgba(26,26,26,.12);
      border-radius: 10px;
      background: #fff;
    }

    @media (min-width: 600px) {
      .dash-actions {
        grid-template-columns: repeat(4, 1fr);
      }
    }
    /* ── Preloader ── */
    #preloader{position:fixed;inset:0;z-index:9999;background:#0a0804;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all}
    #preloader .pre__bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 48%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none}
    .pre__monogram{position:relative;z-index:1;width:80px;height:80px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(201,168,76,.3);border-radius:14px;margin-bottom:20px;opacity:0;animation:preScaleIn .6s cubic-bezier(.34,1.56,.64,1) .2s both}
    .pre__monogram span{font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:600;font-style:italic;color:#C9A84C;letter-spacing:2px}
    .pre__wordmark{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3.8vw,2rem);font-weight:300;letter-spacing:.28em;color:rgba(255,255,255,.92);text-transform:uppercase;opacity:0;animation:preFadeIn .7s ease both .6s;position:relative;z-index:1;margin-bottom:6px}
    .pre__wordmark em{font-style:italic;color:#C9A84C}
    .pre__sub{font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(201,168,76,.4);opacity:0;animation:preFadeIn .5s ease both .9s;position:relative;z-index:1;margin-bottom:16px}
    .pre__counter{font-size:10px;letter-spacing:.22em;font-weight:400;color:rgba(201,168,76,.55);font-family:'DM Sans',sans-serif;position:relative;z-index:1;opacity:0;animation:preFadeIn .4s ease both 1s}
    .pre__counter::after{content:'%';opacity:.7;font-size:8px;margin-left:1px}
    .pre__line{position:absolute;bottom:0;left:0;height:1px;background:#C9A84C;width:0;transition:width 2.4s cubic-bezier(.77,0,.18,1);opacity:.5}
    .pre__line.running{width:100%}
    #preloader.is-done{transition:transform .8s cubic-bezier(.77,0,.18,1) .1s;transform:translateY(-100%)}
    .preloading body,html.preloading{overflow:hidden}
    @keyframes preScaleIn{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
    @keyframes preFadeIn{to{opacity:1}}
    @media(prefers-reduced-motion:reduce){#preloader.is-done,.pre__monogram,.pre__wordmark,.pre__sub,.pre__counter,.pre__line{animation:none!important;transition:none!important;opacity:1;transform:none;width:100%}}
  </style>
</head>
<body>

<div id="preloader" aria-hidden="true">
  <div class="pre__bg"></div>
  <div class="pre__monogram"><span>&#201;E</span></div>
  <div class="pre__wordmark"><em>&#201;lys&#233;e</em> Events</div>
  <div class="pre__sub">Kundenportal</div>
  <div class="pre__counter" id="preCounter">0</div>
  <div class="pre__line" id="preLine"></div>
</div>
<script>
(function(){
  var pre=document.getElementById('preloader');
  document.documentElement.classList.add('preloading');
  var counter=document.getElementById('preCounter');
  var line=document.getElementById('preLine');
  requestAnimationFrame(function(){line.classList.add('running')});
  var n=0;
  var iv=setInterval(function(){n=Math.min(n+Math.floor(Math.random()*4)+1,100);counter.textContent=n;if(n>=100)clearInterval(iv)},50);
  window.addEventListener('load',function(){
    clearInterval(iv);counter.textContent='100';
    setTimeout(function(){pre.classList.add('is-done');document.documentElement.classList.remove('preloading')},1800);
  });
  setTimeout(function(){pre.classList.add('is-done');document.documentElement.classList.remove('preloading')},5000);
})();
</script>

  <div th:replace="~{fragments/admin-nav :: customer-topnav}"></div>
  <main class="portal-main">
    <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

    <div class="portal-header">
      <h1 class="portal-header__title" th:text="${customer.firstName != null && !customer.firstName.isEmpty()} ? 'Willkommen, ' + ${customer.firstName} : 'Willkommen'">Willkommen</h1>
      <p class="portal-header__subtitle">Ihr Kundenportal</p>
    </div>

    <!-- Quick Actions -->
    <div class="dash-actions">
      <a th:href="@{/portal/anfrage}" class="dash-action dash-action--primary">
        <div class="dash-action__icon">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
        <div class="dash-action__label">Neue Anfrage</div>
      </a>
      <a th:href="@{/portal/rechnungen}" class="dash-action">
        <div class="dash-action__icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <div class="dash-action__label">Rechnungen</div>
      </a>
      <a th:href="@{/portal/angebote}" class="dash-action">
        <div class="dash-action__icon">
          <svg viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        </div>
        <div class="dash-action__label">Angebote</div>
      </a>
      <a th:href="@{/portal/dokumente}" class="dash-action">
        <div class="dash-action__icon">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        </div>
        <div class="dash-action__label">Dokumente</div>
      </a>
    </div>

    <!-- Buchungen -->
    <div class="dash-section">
      <div class="dash-section__head">
        <div class="dash-section__title">Ihre Buchungen</div>
      </div>

      <div th:if="${#lists.isEmpty(bookings)}" class="dash-empty">
        Noch keine Buchungen vorhanden. Stellen Sie jetzt eine Anfrage.
      </div>

      <div th:each="b : ${bookings}">
        <a th:href="@{/portal/buchung/{id}(id=${b.id})}" class="booking-card">
          <div class="booking-card__info">
            <div class="booking-card__type" th:text="${b.bookingTypeEnum.label}">Hochzeit</div>
            <div class="booking-card__title" th:text="${b.eventDate != null ? 'Event am ' + @dateUtil.format(b.eventDate) : 'Datum noch offen'}">Event am 2024-06-15</div>
            <div class="booking-card__meta">
              <span th:if="${b.guestCount != null}" th:text="${b.guestCount} + ' Gäste'">120 Gäste</span>
              <span th:if="${b.guestCount != null && b.eventTimeSlot != null}"> | </span>
              <span th:if="${b.eventTimeSlot != null}" th:text="${b.eventTimeSlot}">Abend</span>
            </div>
          </div>
          <div class="booking-card__right">
            <span class="status-badge" th:classappend="'status-badge--' + ${b.status}" th:text="${b.statusEnum.label}">Anfrage</span>
          </div>
        </a>
      </div>
    </div>

  </main>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
