<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title th:text="${pageTitle != null ? pageTitle + ' - Elysee Events Portal' : 'Elysee Events Portal'}">Elysee Events Portal</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <nav class="portal-nav">
    <a th:href="@{/portal/dashboard}" class="portal-nav__logo">
      <div class="portal-nav__monogram">EE</div>
      <div class="portal-nav__wordmark">Kundenportal</div>
    </a>

    <ul class="portal-nav__links" sec:authorize="hasRole('CUSTOMER')">
      <li><a th:href="@{/portal/dashboard}" th:classappend="${activeNav == 'dashboard'} ? 'active'">Dashboard</a></li>
      <li><a th:href="@{/portal/profil}" th:classappend="${activeNav == 'profil'} ? 'active'">Profil</a></li>
    </ul>

    <div class="portal-nav__user">
      <span class="portal-nav__username" sec:authentication="name">user@example.com</span>
      <form th:action="@{/portal/logout}" method="post" style="display:inline">
        <button type="submit" class="portal-nav__logout">Abmelden</button>
      </form>
    </div>
  </nav>

  <main class="portal-main">
    <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>
    <div th:replace="${content}">Content</div>
  </main>
</body>
</html>
