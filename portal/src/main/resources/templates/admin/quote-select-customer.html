<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neues Angebot &mdash; Kunde w&auml;hlen - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title">Neues Angebot &mdash; Kunde w&auml;hlen</h1>
        <p class="portal-header__subtitle">W&auml;hlen Sie den Kunden f&uuml;r das neue Angebot</p>
      </div>

      <div th:if="${#lists.isEmpty(customers)}" class="empty-state">
        <div class="empty-state__title">Keine Kunden vorhanden</div>
        <div class="empty-state__text">Legen Sie zuerst einen <a th:href="@{/portal/admin/kunde/neu}">neuen Kunden</a> an.</div>
      </div>

      <div th:each="c : ${customers}">
        <a th:href="@{/portal/admin/angebot/neu/{customerId}(customerId=${c.id})}" class="booking-card">
          <div class="booking-card__info">
            <div class="booking-card__title" th:text="${c.fullName}">Max Mustermann</div>
            <div class="booking-card__meta">
              <span th:if="${c.company != null and !c.company.isEmpty()}" th:text="${c.company} + ' &middot; '"></span>
              <span th:text="${c.email}">email@example.de</span>
              <span th:if="${c.city != null and !c.city.isEmpty()}" th:text="' &middot; ' + ${c.city}"></span>
            </div>
          </div>
          <div class="booking-card__right">
            <span class="booking-card__type">Ausw&auml;hlen</span>
          </div>
        </a>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
