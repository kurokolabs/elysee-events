<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neuer Kunde - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title">Neuer Kunde</h1>
        <p class="portal-header__subtitle">Erstellen Sie einen neuen Kunden mit Zugangsdaten</p>
      </div>

      <div class="detail-card" style="max-width:720px;">
        <div class="detail-card__title">Kundendaten</div>
        <form th:action="@{/portal/admin/kunde/neu}" method="post">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="firstName">Vorname *</label>
              <input type="text" id="firstName" name="firstName" class="form-input" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="lastName">Nachname *</label>
              <input type="text" id="lastName" name="lastName" class="form-input" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">E-Mail (Login) *</label>
            <input type="email" id="email" name="email" class="form-input" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="company">Firma</label>
              <input type="text" id="company" name="company" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Telefon</label>
              <input type="tel" id="phone" name="phone" class="form-input">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="address">Adresse</label>
            <input type="text" id="address" name="address" class="form-input">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="postalCode">PLZ</label>
              <input type="text" id="postalCode" name="postalCode" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="city">Stadt</label>
              <input type="text" id="city" name="city" class="form-input">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="notes">Interne Notizen</label>
            <textarea id="notes" name="notes" class="form-textarea"></textarea>
          </div>

          <div style="display:flex; gap:12px; margin-top:24px;">
            <button type="submit" class="btn btn--gold">Kunde anlegen</button>
            <a th:href="@{/portal/admin/kunden}" class="btn btn--outline">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
