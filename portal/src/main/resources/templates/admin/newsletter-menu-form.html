<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Speisekarte - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Neue Speisekarte</h1>
        <p class="portal-header__subtitle">Wöchentliche Speisekarte für den Newsletter erstellen</p>
      </div>

      <form th:action="${isNew} ? @{/portal/admin/newsletter/speisekarte/neu} : @{/portal/admin/newsletter/speisekarte/{id}(id=${menu.id})}" method="post" class="form-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
          <div class="form-group">
            <label class="form-label" for="weekStart">Woche von</label>
            <input type="date" id="weekStart" name="weekStart" class="form-input" th:value="${menu.weekStart}" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="weekEnd">Woche bis</label>
            <input type="date" id="weekEnd" name="weekEnd" class="form-input" th:value="${menu.weekEnd}" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="monday">Montag</label>
          <textarea id="monday" name="monday" class="form-textarea" rows="2" placeholder="z.B. Haehnchenbrust mit Kartoffelgratin, Beilagensalat" th:text="${menu.monday}"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="tuesday">Dienstag</label>
          <textarea id="tuesday" name="tuesday" class="form-textarea" rows="2" placeholder="z.B. Haehnchenbrust mit Kartoffelgratin, Beilagensalat" th:text="${menu.tuesday}"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="wednesday">Mittwoch</label>
          <textarea id="wednesday" name="wednesday" class="form-textarea" rows="2" placeholder="z.B. Haehnchenbrust mit Kartoffelgratin, Beilagensalat" th:text="${menu.wednesday}"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="thursday">Donnerstag</label>
          <textarea id="thursday" name="thursday" class="form-textarea" rows="2" placeholder="z.B. Haehnchenbrust mit Kartoffelgratin, Beilagensalat" th:text="${menu.thursday}"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="friday">Freitag</label>
          <textarea id="friday" name="friday" class="form-textarea" rows="2" placeholder="z.B. Haehnchenbrust mit Kartoffelgratin, Beilagensalat" th:text="${menu.friday}"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">Hinweise</label>
          <textarea id="notes" name="notes" class="form-textarea" rows="2" placeholder="z.B. Vegetarische Alternative auf Anfrage" th:text="${menu.notes}"></textarea>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px;">
          <button type="submit" class="btn btn--gold">Speisekarte speichern</button>
          <a th:href="@{/portal/admin/newsletter}" class="btn btn--outline">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>

  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
