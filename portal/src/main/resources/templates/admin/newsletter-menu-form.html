<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Speisekarte - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .day-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .dish-field { display:flex; gap:8px; align-items:flex-end; }
    .dish-field .form-input { flex:1; }
    .dish-field .price-input { width:80px; flex-shrink:0; text-align:right; }
    .label-meat { font-size:11px; color:#C0392B; font-weight:600; }
    .label-veg { font-size:11px; color:#6B8E23; font-weight:600; }
    .price-label { font-size:10px; color:var(--muted); text-align:right; display:block; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Neue Speisekarte</h1>
        <p class="portal-header__subtitle">Woche auswählen, Gerichte eintragen, speichern und in der Vorschau prüfen</p>
      </div>

      <form th:action="${isNew} ? @{/portal/admin/newsletter/speisekarte/neu} : @{/portal/admin/newsletter/speisekarte/{id}(id=${menu.id})}" method="post" class="form-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
          <div class="form-group">
            <label class="form-label" for="weekStart">Woche von</label>
            <input type="date" id="weekStart" name="weekStart" class="form-input" th:value="${menu.weekStart}" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="weekEnd">Woche bis</label>
            <input type="date" id="weekEnd" name="weekEnd" class="form-input" th:value="${menu.weekEnd}" required>
          </div>
        </div>

        <!-- Montag -->
        <div class="form-group">
          <label class="form-label">Montag</label>
          <div class="day-row">
            <div>
              <label class="form-label label-meat" for="mondayMeat">Fleisch / Fisch</label>
              <div class="dish-field">
                <input type="text" id="mondayMeat" name="mondayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.mondayMeat}" placeholder="z.B. Schnitzel mit Pommes" autocomplete="off">
                <input type="text" id="mondayMeatPrice" name="mondayMeatPrice" class="form-input price-input" th:value="${menu.mondayMeatPrice}" placeholder="8,50">
              </div>
            </div>
            <div>
              <label class="form-label label-veg" for="mondayVeg">Vegetarisch</label>
              <div class="dish-field">
                <input type="text" id="mondayVeg" name="mondayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.mondayVeg}" placeholder="z.B. Gemüselasagne" autocomplete="off">
                <input type="text" id="mondayVegPrice" name="mondayVegPrice" class="form-input price-input" th:value="${menu.mondayVegPrice}" placeholder="8,00">
              </div>
            </div>
          </div>
        </div>

        <!-- Dienstag -->
        <div class="form-group">
          <label class="form-label">Dienstag</label>
          <div class="day-row">
            <div>
              <label class="form-label label-meat" for="tuesdayMeat">Fleisch / Fisch</label>
              <div class="dish-field">
                <input type="text" id="tuesdayMeat" name="tuesdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.tuesdayMeat}" placeholder="z.B. Rindergulasch mit Spätzle" autocomplete="off">
                <input type="text" id="tuesdayMeatPrice" name="tuesdayMeatPrice" class="form-input price-input" th:value="${menu.tuesdayMeatPrice}" placeholder="8,50">
              </div>
            </div>
            <div>
              <label class="form-label label-veg" for="tuesdayVeg">Vegetarisch</label>
              <div class="dish-field">
                <input type="text" id="tuesdayVeg" name="tuesdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.tuesdayVeg}" placeholder="z.B. Käsespätzle" autocomplete="off">
                <input type="text" id="tuesdayVegPrice" name="tuesdayVegPrice" class="form-input price-input" th:value="${menu.tuesdayVegPrice}" placeholder="8,00">
              </div>
            </div>
          </div>
        </div>

        <!-- Mittwoch -->
        <div class="form-group">
          <label class="form-label">Mittwoch</label>
          <div class="day-row">
            <div>
              <label class="form-label label-meat" for="wednesdayMeat">Fleisch / Fisch</label>
              <div class="dish-field">
                <input type="text" id="wednesdayMeat" name="wednesdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.wednesdayMeat}" placeholder="z.B. Hähnchen-Curry mit Reis" autocomplete="off">
                <input type="text" id="wednesdayMeatPrice" name="wednesdayMeatPrice" class="form-input price-input" th:value="${menu.wednesdayMeatPrice}" placeholder="8,50">
              </div>
            </div>
            <div>
              <label class="form-label label-veg" for="wednesdayVeg">Vegetarisch</label>
              <div class="dish-field">
                <input type="text" id="wednesdayVeg" name="wednesdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.wednesdayVeg}" placeholder="z.B. Pilzrisotto" autocomplete="off">
                <input type="text" id="wednesdayVegPrice" name="wednesdayVegPrice" class="form-input price-input" th:value="${menu.wednesdayVegPrice}" placeholder="8,00">
              </div>
            </div>
          </div>
        </div>

        <!-- Donnerstag -->
        <div class="form-group">
          <label class="form-label">Donnerstag</label>
          <div class="day-row">
            <div>
              <label class="form-label label-meat" for="thursdayMeat">Fleisch / Fisch</label>
              <div class="dish-field">
                <input type="text" id="thursdayMeat" name="thursdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.thursdayMeat}" placeholder="z.B. Putengeschnetzeltes" autocomplete="off">
                <input type="text" id="thursdayMeatPrice" name="thursdayMeatPrice" class="form-input price-input" th:value="${menu.thursdayMeatPrice}" placeholder="8,50">
              </div>
            </div>
            <div>
              <label class="form-label label-veg" for="thursdayVeg">Vegetarisch</label>
              <div class="dish-field">
                <input type="text" id="thursdayVeg" name="thursdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.thursdayVeg}" placeholder="z.B. Spinat-Cannelloni" autocomplete="off">
                <input type="text" id="thursdayVegPrice" name="thursdayVegPrice" class="form-input price-input" th:value="${menu.thursdayVegPrice}" placeholder="8,00">
              </div>
            </div>
          </div>
        </div>

        <!-- Freitag -->
        <div class="form-group">
          <label class="form-label">Freitag</label>
          <div class="day-row">
            <div>
              <label class="form-label label-meat" for="fridayMeat">Fleisch / Fisch</label>
              <div class="dish-field">
                <input type="text" id="fridayMeat" name="fridayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.fridayMeat}" placeholder="z.B. Lachsfilet mit Kartoffeln" autocomplete="off">
                <input type="text" id="fridayMeatPrice" name="fridayMeatPrice" class="form-input price-input" th:value="${menu.fridayMeatPrice}" placeholder="8,50">
              </div>
            </div>
            <div>
              <label class="form-label label-veg" for="fridayVeg">Vegetarisch</label>
              <div class="dish-field">
                <input type="text" id="fridayVeg" name="fridayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.fridayVeg}" placeholder="z.B. Gemüse-Quiche" autocomplete="off">
                <input type="text" id="fridayVegPrice" name="fridayVegPrice" class="form-input price-input" th:value="${menu.fridayVegPrice}" placeholder="8,00">
              </div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">Hinweise</label>
          <textarea id="notes" name="notes" class="form-textarea" rows="2" spellcheck="true"
                    placeholder="z.B. Vegetarische Alternative auf Anfrage" th:text="${menu.notes}"></textarea>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px;">
          <button type="submit" class="btn btn--gold">Speisekarte speichern</button>
          <a th:href="@{/portal/admin/newsletter}" class="btn btn--outline">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>

  <script th:src="@{/portal/js/portal.js}"></script>
  <script th:inline="javascript">
  (function() {
    var dishes = [];
    fetch(/*[[@{/portal/admin/newsletter/speisekarte/dishes}]]*/ '/portal/admin/newsletter/speisekarte/dishes')
      .then(function(r) { return r.json(); })
      .then(function(data) { dishes = data; });

    document.querySelectorAll('.dish-autocomplete').forEach(function(input) {
      var listId = input.id + '-suggestions';
      var datalist = document.createElement('datalist');
      datalist.id = listId;
      input.setAttribute('list', listId);
      input.parentNode.appendChild(datalist);

      input.addEventListener('input', function() {
        var val = this.value.toLowerCase();
        datalist.innerHTML = '';
        if (val.length < 1) return;
        var matches = dishes.filter(function(d) {
          return d.toLowerCase().indexOf(val) !== -1;
        });
        matches.slice(0, 10).forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m;
          datalist.appendChild(opt);
        });
      });
    });
  })();
  </script>
</body>
</html>
