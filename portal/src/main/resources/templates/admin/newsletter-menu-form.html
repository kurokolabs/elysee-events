<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Speisekarte - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .day-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .dish-field { display:flex; gap:8px; align-items:flex-end; }
    .dish-field .form-input { flex:1; }
    .dish-field .price-input { width:80px; flex-shrink:0; text-align:right; }
    .label-meat { font-size:11px; color:#C0392B; font-weight:600; }
    .label-veg { font-size:11px; color:#6B8E23; font-weight:600; }
    .holiday-banner {
      display:none; padding:16px 20px; background:rgba(201,168,76,.08); border:1px solid rgba(201,168,76,.2);
      border-radius:2px; text-align:center; font-family:'Cormorant Garamond',serif;
      font-size:1.1rem; color:#C9A84C; font-style:italic;
    }
  </style>
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Neue Speisekarte</h1>
        <p class="portal-header__subtitle">Arbeitswoche auswählen, Gerichte eintragen. Bestätigte Karten werden Montag 09:00 automatisch versendet.</p>
      </div>

      <form id="menuForm" th:action="${isNew} ? @{/portal/admin/newsletter/speisekarte/neu} : @{/portal/admin/newsletter/speisekarte/{id}(id=${menu.id})}" method="post" class="form-card">
        <input type="hidden" id="statusField" name="status" value="ENTWURF">
        <input type="hidden" id="weekStart" name="weekStart" th:value="${menu.weekStart}">
        <input type="hidden" id="weekEnd" name="weekEnd" th:value="${menu.weekEnd}">

        <!-- Wochen-Dropdown -->
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label" for="weekSelect">Arbeitswoche</label>
          <select id="weekSelect" class="form-input" style="padding:12px 14px;">
            <th:block th:each="w : ${weeks}">
              <option th:value="${w.weekStart + '|' + w.weekEnd}" th:text="${w.label}"
                      th:selected="${w.weekStart == menu.weekStart}"></option>
            </th:block>
          </select>
        </div>

        <!-- Montag -->
        <div class="form-group" id="monday-group">
          <label class="form-label">Montag</label>
          <div id="monday-holiday" class="holiday-banner"></div>
          <div id="monday-section">
            <div class="day-row">
              <div>
                <label class="form-label label-meat">Fleisch / Fisch</label>
                <div class="dish-field">
                  <input type="text" name="mondayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.mondayMeat}" placeholder="z.B. Schnitzel mit Pommes" autocomplete="off">
                  <input type="text" name="mondayMeatPrice" class="form-input price-input" th:value="${menu.mondayMeatPrice != null ? menu.mondayMeatPrice : '8,50'}">
                </div>
              </div>
              <div>
                <label class="form-label label-veg">Vegetarisch</label>
                <div class="dish-field">
                  <input type="text" name="mondayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.mondayVeg}" placeholder="z.B. Gemüselasagne" autocomplete="off">
                  <input type="text" name="mondayVegPrice" class="form-input price-input" th:value="${menu.mondayVegPrice != null ? menu.mondayVegPrice : '8,00'}">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Dienstag -->
        <div class="form-group" id="tuesday-group">
          <label class="form-label">Dienstag</label>
          <div id="tuesday-holiday" class="holiday-banner"></div>
          <div id="tuesday-section">
            <div class="day-row">
              <div>
                <label class="form-label label-meat">Fleisch / Fisch</label>
                <div class="dish-field">
                  <input type="text" name="tuesdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.tuesdayMeat}" placeholder="z.B. Rindergulasch" autocomplete="off">
                  <input type="text" name="tuesdayMeatPrice" class="form-input price-input" th:value="${menu.tuesdayMeatPrice != null ? menu.tuesdayMeatPrice : '8,50'}">
                </div>
              </div>
              <div>
                <label class="form-label label-veg">Vegetarisch</label>
                <div class="dish-field">
                  <input type="text" name="tuesdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.tuesdayVeg}" placeholder="z.B. Käsespätzle" autocomplete="off">
                  <input type="text" name="tuesdayVegPrice" class="form-input price-input" th:value="${menu.tuesdayVegPrice != null ? menu.tuesdayVegPrice : '8,00'}">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Mittwoch -->
        <div class="form-group" id="wednesday-group">
          <label class="form-label">Mittwoch</label>
          <div id="wednesday-holiday" class="holiday-banner"></div>
          <div id="wednesday-section">
            <div class="day-row">
              <div>
                <label class="form-label label-meat">Fleisch / Fisch</label>
                <div class="dish-field">
                  <input type="text" name="wednesdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.wednesdayMeat}" placeholder="z.B. Hähnchen-Curry" autocomplete="off">
                  <input type="text" name="wednesdayMeatPrice" class="form-input price-input" th:value="${menu.wednesdayMeatPrice != null ? menu.wednesdayMeatPrice : '8,50'}">
                </div>
              </div>
              <div>
                <label class="form-label label-veg">Vegetarisch</label>
                <div class="dish-field">
                  <input type="text" name="wednesdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.wednesdayVeg}" placeholder="z.B. Pilzrisotto" autocomplete="off">
                  <input type="text" name="wednesdayVegPrice" class="form-input price-input" th:value="${menu.wednesdayVegPrice != null ? menu.wednesdayVegPrice : '8,00'}">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Donnerstag -->
        <div class="form-group" id="thursday-group">
          <label class="form-label">Donnerstag</label>
          <div id="thursday-holiday" class="holiday-banner"></div>
          <div id="thursday-section">
            <div class="day-row">
              <div>
                <label class="form-label label-meat">Fleisch / Fisch</label>
                <div class="dish-field">
                  <input type="text" name="thursdayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.thursdayMeat}" placeholder="z.B. Putengeschnetzeltes" autocomplete="off">
                  <input type="text" name="thursdayMeatPrice" class="form-input price-input" th:value="${menu.thursdayMeatPrice != null ? menu.thursdayMeatPrice : '8,50'}">
                </div>
              </div>
              <div>
                <label class="form-label label-veg">Vegetarisch</label>
                <div class="dish-field">
                  <input type="text" name="thursdayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.thursdayVeg}" placeholder="z.B. Spinat-Cannelloni" autocomplete="off">
                  <input type="text" name="thursdayVegPrice" class="form-input price-input" th:value="${menu.thursdayVegPrice != null ? menu.thursdayVegPrice : '8,00'}">
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Freitag -->
        <div class="form-group" id="friday-group">
          <label class="form-label">Freitag</label>
          <div id="friday-holiday" class="holiday-banner"></div>
          <div id="friday-section">
            <div class="day-row">
              <div>
                <label class="form-label label-meat">Fleisch / Fisch</label>
                <div class="dish-field">
                  <input type="text" name="fridayMeat" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.fridayMeat}" placeholder="z.B. Lachsfilet" autocomplete="off">
                  <input type="text" name="fridayMeatPrice" class="form-input price-input" th:value="${menu.fridayMeatPrice != null ? menu.fridayMeatPrice : '8,50'}">
                </div>
              </div>
              <div>
                <label class="form-label label-veg">Vegetarisch</label>
                <div class="dish-field">
                  <input type="text" name="fridayVeg" class="form-input dish-autocomplete" spellcheck="true" th:value="${menu.fridayVeg}" placeholder="z.B. Gemüse-Quiche" autocomplete="off">
                  <input type="text" name="fridayVegPrice" class="form-input price-input" th:value="${menu.fridayVegPrice != null ? menu.fridayVegPrice : '8,00'}">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">Hinweise</label>
          <textarea id="notes" name="notes" class="form-textarea" rows="2" spellcheck="true"
                    placeholder="z.B. Vegetarische Alternative auf Anfrage" th:text="${menu.notes}"></textarea>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;">
          <button type="button" class="btn btn--outline" onclick="document.getElementById('statusField').value='ENTWURF';document.getElementById('menuForm').submit();">Als Entwurf speichern</button>
          <button type="button" class="btn btn--gold" onclick="document.getElementById('statusField').value='BESTAETIGT';document.getElementById('menuForm').submit();">Bestätigen und planen</button>
          <a th:href="@{/portal/admin/newsletter}" class="btn btn--outline" style="margin-left:auto;">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>

  <script th:src="@{/portal/js/portal.js}"></script>
  <script th:inline="javascript" th:attr="nonce=${cspNonce}">
  (function() {
    var DAYS = ['monday','tuesday','wednesday','thursday','friday'];

    // Wochen-Dropdown steuert hidden fields + Feiertage
    var weekSelect = document.getElementById('weekSelect');
    weekSelect.addEventListener('change', function() {
      var parts = this.value.split('|');
      document.getElementById('weekStart').value = parts[0];
      document.getElementById('weekEnd').value = parts[1];
      fetchHolidays(parts[0]);
    });

    function fetchHolidays(weekStart) {
      fetch(/*[[@{/portal/admin/newsletter/speisekarte/feiertage}]]*/ '/portal/admin/newsletter/speisekarte/feiertage' + '?weekStart=' + weekStart)
        .then(function(r) { return r.json(); })
        .then(function(holidays) {
          DAYS.forEach(function(day) {
            var section = document.getElementById(day + '-section');
            var holiday = document.getElementById(day + '-holiday');
            if (holidays[day]) {
              section.style.display = 'none';
              holiday.textContent = holidays[day];
              holiday.style.display = 'block';
            } else {
              section.style.display = '';
              holiday.style.display = 'none';
              holiday.textContent = '';
            }
          });
        });
    }

    // Initiale Feiertage laden
    fetchHolidays(document.getElementById('weekStart').value);

    // Autocomplete
    var dishes = [];
    fetch(/*[[@{/portal/admin/newsletter/speisekarte/dishes}]]*/ '/portal/admin/newsletter/speisekarte/dishes')
      .then(function(r) { return r.json(); })
      .then(function(data) { dishes = data; });

    document.querySelectorAll('.dish-autocomplete').forEach(function(input) {
      var listId = input.name + '-suggestions';
      var datalist = document.createElement('datalist');
      datalist.id = listId;
      input.setAttribute('list', listId);
      input.parentNode.appendChild(datalist);

      input.addEventListener('input', function() {
        var val = this.value.toLowerCase();
        datalist.innerHTML = '';
        if (val.length < 1) return;
        var matches = dishes.filter(function(d) {
          return d.toLowerCase().indexOf(val) !== -1;
        });
        matches.slice(0, 10).forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m;
          datalist.appendChild(opt);
        });
      });
    });
  })();
  </script>
</body>
</html>
