<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Speisekarte - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="${isNew} ? 'Neue Speisekarte' : 'Speisekarte bearbeiten'">Neue Speisekarte</h1>
        <p class="portal-header__subtitle">Woche auswählen, Gerichte eintragen, speichern und in der Vorschau prüfen</p>
      </div>

      <form th:action="${isNew} ? @{/portal/admin/newsletter/speisekarte/neu} : @{/portal/admin/newsletter/speisekarte/{id}(id=${menu.id})}" method="post" class="form-card">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;">
          <div class="form-group">
            <label class="form-label" for="weekStart">Woche von</label>
            <input type="date" id="weekStart" name="weekStart" class="form-input" th:value="${menu.weekStart}" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="weekEnd">Woche bis</label>
            <input type="date" id="weekEnd" name="weekEnd" class="form-input" th:value="${menu.weekEnd}" required>
          </div>
        </div>

        <!-- Montag -->
        <div class="form-group">
          <label class="form-label">Montag</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="form-label" for="mondayMeat" style="font-size:11px; color:var(--muted);">Fleisch / Fisch</label>
              <input type="text" id="mondayMeat" name="mondayMeat" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.mondayMeat}" placeholder="z.B. Schnitzel mit Pommes" autocomplete="off">
            </div>
            <div>
              <label class="form-label" for="mondayVeg" style="font-size:11px; color:#6B8E23;">Vegetarisch</label>
              <input type="text" id="mondayVeg" name="mondayVeg" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.mondayVeg}" placeholder="z.B. Gemüselasagne" autocomplete="off">
            </div>
          </div>
        </div>

        <!-- Dienstag -->
        <div class="form-group">
          <label class="form-label">Dienstag</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="form-label" for="tuesdayMeat" style="font-size:11px; color:var(--muted);">Fleisch / Fisch</label>
              <input type="text" id="tuesdayMeat" name="tuesdayMeat" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.tuesdayMeat}" placeholder="z.B. Rindergulasch mit Spätzle" autocomplete="off">
            </div>
            <div>
              <label class="form-label" for="tuesdayVeg" style="font-size:11px; color:#6B8E23;">Vegetarisch</label>
              <input type="text" id="tuesdayVeg" name="tuesdayVeg" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.tuesdayVeg}" placeholder="z.B. Käsespätzle" autocomplete="off">
            </div>
          </div>
        </div>

        <!-- Mittwoch -->
        <div class="form-group">
          <label class="form-label">Mittwoch</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="form-label" for="wednesdayMeat" style="font-size:11px; color:var(--muted);">Fleisch / Fisch</label>
              <input type="text" id="wednesdayMeat" name="wednesdayMeat" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.wednesdayMeat}" placeholder="z.B. Hähnchen-Curry mit Reis" autocomplete="off">
            </div>
            <div>
              <label class="form-label" for="wednesdayVeg" style="font-size:11px; color:#6B8E23;">Vegetarisch</label>
              <input type="text" id="wednesdayVeg" name="wednesdayVeg" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.wednesdayVeg}" placeholder="z.B. Pilzrisotto" autocomplete="off">
            </div>
          </div>
        </div>

        <!-- Donnerstag -->
        <div class="form-group">
          <label class="form-label">Donnerstag</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="form-label" for="thursdayMeat" style="font-size:11px; color:var(--muted);">Fleisch / Fisch</label>
              <input type="text" id="thursdayMeat" name="thursdayMeat" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.thursdayMeat}" placeholder="z.B. Putengeschnetzeltes" autocomplete="off">
            </div>
            <div>
              <label class="form-label" for="thursdayVeg" style="font-size:11px; color:#6B8E23;">Vegetarisch</label>
              <input type="text" id="thursdayVeg" name="thursdayVeg" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.thursdayVeg}" placeholder="z.B. Spinat-Cannelloni" autocomplete="off">
            </div>
          </div>
        </div>

        <!-- Freitag -->
        <div class="form-group">
          <label class="form-label">Freitag</label>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div>
              <label class="form-label" for="fridayMeat" style="font-size:11px; color:var(--muted);">Fleisch / Fisch</label>
              <input type="text" id="fridayMeat" name="fridayMeat" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.fridayMeat}" placeholder="z.B. Lachsfilet mit Kartoffeln" autocomplete="off">
            </div>
            <div>
              <label class="form-label" for="fridayVeg" style="font-size:11px; color:#6B8E23;">Vegetarisch</label>
              <input type="text" id="fridayVeg" name="fridayVeg" class="form-input dish-autocomplete" spellcheck="true"
                     th:value="${menu.fridayVeg}" placeholder="z.B. Gemüse-Quiche" autocomplete="off">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="notes">Hinweise</label>
          <textarea id="notes" name="notes" class="form-textarea" rows="2" spellcheck="true"
                    placeholder="z.B. Vegetarische Alternative auf Anfrage" th:text="${menu.notes}"></textarea>
        </div>

        <div style="display:flex; gap:12px; margin-top:24px;">
          <button type="submit" class="btn btn--gold">Speisekarte speichern</button>
          <a th:href="@{/portal/admin/newsletter}" class="btn btn--outline">Abbrechen</a>
        </div>
      </form>
    </div>
  </div>

  <script th:src="@{/portal/js/portal.js}"></script>
  <script th:inline="javascript">
  (function() {
    var dishes = [];
    fetch(/*[[@{/portal/admin/newsletter/speisekarte/dishes}]]*/ '/portal/admin/newsletter/speisekarte/dishes')
      .then(function(r) { return r.json(); })
      .then(function(data) { dishes = data; });

    document.querySelectorAll('.dish-autocomplete').forEach(function(input) {
      var listId = input.id + '-suggestions';
      var datalist = document.createElement('datalist');
      datalist.id = listId;
      input.setAttribute('list', listId);
      input.parentNode.appendChild(datalist);

      input.addEventListener('input', function() {
        var val = this.value.toLowerCase();
        datalist.innerHTML = '';
        if (val.length < 1) return;
        var matches = dishes.filter(function(d) {
          return d.toLowerCase().indexOf(val) !== -1;
        });
        matches.slice(0, 10).forEach(function(m) {
          var opt = document.createElement('option');
          opt.value = m;
          datalist.appendChild(opt);
        });
      });
    });
  })();
  </script>
</body>
</html>
