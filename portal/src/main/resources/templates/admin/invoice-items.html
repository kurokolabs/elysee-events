<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rechnung erstellen - Élysée Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .item-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; flex-wrap: wrap; }
    .item-row .form-group { margin-bottom: 0; }
    .item-header { display: flex; gap: 8px; margin-bottom: 6px; font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
    .item-header span:nth-child(1) { flex: 3; }
    .item-header span:nth-child(2) { flex: 1; }
    .item-header span:nth-child(3) { flex: 1; }
    .item-header span:nth-child(4) { flex: 1; }
    .item-header span:nth-child(5) { flex: 1; }
    .item-header span:nth-child(6) { width: 32px; }
    .period-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .period-row .form-group { margin-bottom: 0; }
    @media (max-width: 768px) {
      .item-row { flex-direction: column; gap: 6px; padding: 12px; background: var(--surface); border-radius: 4px; }
      .item-row .form-group { width: 100% !important; flex: none !important; }
      .item-header { display: none; }
      .period-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="${standalone} ? 'Unabhängige Rechnung' : 'Rechnung für ' + ${customer.fullName}">Rechnung</h1>
        <p class="portal-header__subtitle">Positionen, Steuersätze und Rechnungsdetails eingeben</p>
      </div>

      <div class="detail-card" style="max-width:920px;">
        <div class="detail-card__title">Rechnungsdaten</div>
        <form th:action="@{/portal/admin/rechnung/preview}" method="post">
          <input th:if="${!standalone}" type="hidden" name="customerId" th:value="${customer.id}">

          <!-- Empfänger (nur bei unabhängiger Rechnung) -->
          <div th:if="${standalone}" style="margin-bottom:24px;">
            <div class="detail-card__title">Empfänger</div>
            <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" name="recipientName" class="form-input" placeholder="Max Mustermann">
              </div>
              <div class="form-group">
                <label class="form-label">Firma</label>
                <input type="text" name="recipientCompany" class="form-input" placeholder="Firma GmbH">
              </div>
              <div class="form-group">
                <label class="form-label">Adresse</label>
                <input type="text" name="recipientAddress" class="form-input" placeholder="Musterstraße 1">
              </div>
              <div class="form-group">
                <label class="form-label">PLZ / Ort</label>
                <div style="display:flex; gap:8px;">
                  <input type="text" name="recipientPostalCode" class="form-input" placeholder="86159" style="width:80px;">
                  <input type="text" name="recipientCity" class="form-input" placeholder="Augsburg" style="flex:1;">
                </div>
              </div>
              <div class="form-group" style="grid-column:1/-1;">
                <label class="form-label">E-Mail (für Rechnungsversand)</label>
                <input type="email" name="recipientEmail" class="form-input" placeholder="rechnung@firma.de">
              </div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="bookingId">Buchung (optional)</label>
            <select id="bookingId" name="bookingId" class="form-select">
              <option value="">Keine Buchung zuordnen</option>
              <option th:each="b : ${bookings}" th:value="${b.id}" th:text="'#' + ${b.id} + ' - ' + ${b.bookingType}">#1 - Hochzeit</option>
            </select>
          </div>

          <!-- Leistungszeitraum -->
          <div class="detail-card__title" style="margin-top:24px;">Leistungszeitraum</div>
          <div class="period-row" style="margin-bottom:16px;">
            <div class="form-group">
              <label class="form-label" for="servicePeriodFrom">Von</label>
              <input type="date" id="servicePeriodFrom" name="servicePeriodFrom" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="servicePeriodTo">Bis</label>
              <input type="date" id="servicePeriodTo" name="servicePeriodTo" class="form-input" disabled>
            </div>
            <div class="form-group" style="align-self:flex-end;">
              <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); cursor:pointer;">
                <input type="checkbox" id="singleDay" checked onchange="document.getElementById('servicePeriodTo').disabled=this.checked; if(this.checked) document.getElementById('servicePeriodTo').value=document.getElementById('servicePeriodFrom').value;">
                Einzeltag
              </label>
            </div>
          </div>

          <!-- Intro-Text (automatisch generiert) -->
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label" for="introText">Einleitungstext (erscheint auf der Rechnung)</label>
            <textarea id="introText" name="introText" class="form-textarea" rows="3" th:text="${prefillIntroText}" placeholder="Wird automatisch aus den Positionen generiert"></textarea>
          </div>

          <!-- Positionen -->
          <div class="detail-card__title" style="margin-top:24px;">Positionen</div>
          <div class="item-header">
            <span>Abrechnungsposten</span>
            <span>Menge</span>
            <span>Einzelpreis</span>
            <span>Gesamtpreis</span>
            <span>USt</span>
            <span></span>
          </div>
          <div id="itemRows">
            <!-- Vorbefüllte Positionen (z.B. aus Angebot) -->
            <th:block th:if="${prefillItems != null}" th:each="item : ${prefillItems}">
              <div class="item-row">
                <div class="form-group" style="flex:3">
                  <select name="itemDesc" class="form-select posten-select">
                    <option value="">-- Posten wählen --</option>
                    <option value="Raummiete" data-tax="SAALMIETE" th:selected="${item.description == 'Raummiete'}">Raummiete</option>
                    <option value="Büffet" data-tax="BUEFFET" th:selected="${item.description == 'Büffet'}">Büffet</option>
                    <option value="Getränke" data-tax="GETRAENKE" th:selected="${item.description == 'Getränke'}">Getränke</option>
                    <option value="Softdrink (Cola, Fanta)" data-tax="GETRAENKE" th:selected="${item.description == 'Softdrink (Cola, Fanta)'}">Softdrink (Cola, Fanta)</option>
                    <option value="Tee" data-tax="GETRAENKE" th:selected="${item.description == 'Tee'}">Tee</option>
                    <option value="Kantinenspeise vegetarisch" data-tax="ESSEN" th:selected="${item.description == 'Kantinenspeise vegetarisch'}">Kantinenspeise vegetarisch</option>
                    <option value="Kantinenspeise Fleisch" data-tax="ESSEN" th:selected="${item.description == 'Kantinenspeise Fleisch'}">Kantinenspeise Fleisch</option>
                    <option value="Butterbreze" data-tax="ESSEN" th:selected="${item.description == 'Butterbreze'}">Butterbreze</option>
                  </select>
                  <input type="hidden" name="itemTaxType" th:value="${item.taxType}">
                </div>
                <div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" th:value="${item.quantity}" step="0.01" min="0.01"></div>
                <div class="form-group" style="flex:1"><input type="text" name="itemPrice" class="form-input calc-price einzel-price" th:value="${item.unitPrice}" placeholder="Einzel" required></div>
                <div class="form-group" style="flex:1"><input type="text" class="form-input calc-price gesamt-price" placeholder="Gesamt"></div>
                <div class="form-group" style="flex:1"><span class="ust-display" style="display:inline-block;padding:8px 0;font-size:13px;color:var(--muted);">--</span></div>
                <button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>
              </div>
            </th:block>
            <!-- Leere Zeile wenn keine Vorbefüllung -->
            <div class="item-row" th:if="${prefillItems == null}">
              <div class="form-group" style="flex:3">
                <select name="itemDesc" class="form-select posten-select" required>
                  <option value="">-- Posten wählen --</option>
                  <option value="Raummiete" data-tax="SAALMIETE">Raummiete</option>
                  <option value="Büffet" data-tax="BUEFFET">Büffet</option>
                  <option value="Getränke" data-tax="GETRAENKE">Getränke</option>
                  <option value="Softdrink (Cola, Fanta)" data-tax="GETRAENKE">Softdrink (Cola, Fanta)</option>
                  <option value="Tee" data-tax="GETRAENKE">Tee</option>
                  <option value="Kantinenspeise vegetarisch" data-tax="ESSEN">Kantinenspeise vegetarisch</option>
                  <option value="Kantinenspeise Fleisch" data-tax="ESSEN">Kantinenspeise Fleisch</option>
                  <option value="Butterbreze" data-tax="ESSEN">Butterbreze</option>
                </select>
                <input type="hidden" name="itemTaxType" value="">
              </div>
              <div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>
              <div class="form-group" style="flex:1"><input type="text" name="itemPrice" class="form-input calc-price einzel-price" placeholder="Einzel" required></div>
              <div class="form-group" style="flex:1"><input type="text" class="form-input calc-price gesamt-price" placeholder="Gesamt"></div>
              <div class="form-group" style="flex:1"><span class="ust-display" style="display:inline-block;padding:8px 0;font-size:13px;color:var(--muted);">--</span></div>
              <button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>
            </div>
          </div>
          <button type="button" id="addItem" class="btn btn--outline btn--sm" style="margin-top:8px;">Position hinzufügen</button>

          <div style="display:flex; gap:12px; margin-top:24px;">
            <div class="form-group" style="flex:1">
              <label class="form-label" for="dueDate">Fälligkeitsdatum</label>
              <input type="date" id="dueDate" name="dueDate" class="form-input" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="notes">Notizen (intern)</label>
            <textarea id="notes" name="notes" class="form-textarea" placeholder="Zusätzliche interne Hinweise..."></textarea>
          </div>

          <div style="display:flex; gap:12px; margin-top:24px;">
            <button type="submit" class="btn btn--gold">Vorschau anzeigen</button>
            <a th:href="@{/portal/admin/rechnungen}" class="btn btn--outline">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
  <script>
    // USt-Anzeige-Map
    var ustLabels = { SAALMIETE: '19%', GETRAENKE: '19%', ESSEN: '7%', BUEFFET: '75% zu 19%, 25% zu 7%' };
    // Artikel fuer Einleitungstext
    // Singular/Plural mit Artikel
    var artikelSingular = {
      'Raummiete': 'die Raummiete', 'Büffet': 'das Büffet', 'Getränke': 'das Getränk',
      'Softdrink (Cola, Fanta)': 'den Softdrink', 'Tee': 'den Tee',
      'Kantinenspeise vegetarisch': 'die Kantinenspeise vegetarisch',
      'Kantinenspeise Fleisch': 'die Kantinenspeise Fleisch',
      'Butterbreze': 'die Butterbreze'
    };
    var artikelPlural = {
      'Raummiete': 'die Raummiete', 'Büffet': 'das Büffet', 'Getränke': 'die Getränke',
      'Softdrink (Cola, Fanta)': 'die Softdrinks', 'Tee': 'den Tee',
      'Kantinenspeise vegetarisch': 'die Kantinenspeisen vegetarisch',
      'Kantinenspeise Fleisch': 'die Kantinenspeisen Fleisch',
      'Butterbreze': 'die Butterbrezn'
    };
    // Automatische Preise pro Posten (in EUR)
    var autoPreise = {
      'Tee': '1,50', 'Softdrink (Cola, Fanta)': '2,00', 'Butterbreze': '2,00'
    };

    // Preisfeld: Ausdruecke wie "59,50+16" berechnen
    function calcPrice(input) {
      var val = input.value.trim();
      if (!val || !/[+\-]/.test(val)) return;
      // Kommas zu Punkten
      var expr = val.replace(/,/g, '.').replace(/[^0-9.+\-]/g, '');
      try {
        var parts = expr.split(/(?=[+\-])/);
        var sum = 0;
        for (var i = 0; i < parts.length; i++) {
          sum += parseFloat(parts[i]) || 0;
        }
        sum = Math.round(sum * 100) / 100;
        input.value = sum.toFixed(2).replace('.', ',');
      } catch(e) {}
    }

    // Bei Posten-Auswahl: USt setzen + Intro-Text aktualisieren
    function onPostenChange(select) {
      var row = select.closest('.item-row');
      var opt = select.options[select.selectedIndex];
      var tax = opt.dataset.tax || '';
      row.querySelector('input[name="itemTaxType"]').value = tax;
      row.querySelector('.ust-display').textContent = tax ? ustLabels[tax] : '--';
      // Auto-Preis setzen wenn Feld leer oder 0
      var priceInput = row.querySelector('.einzel-price');
      var curPrice = priceInput.value.trim();
      if (autoPreise[select.value] && (!curPrice || curPrice === '0' || curPrice === '0.00' || curPrice === '0,00')) {
        priceInput.value = autoPreise[select.value];
        syncPrices(row, 'einzel');
      }
      updateIntroText();
    }

    function getArtikel(posten, qty) {
      if (qty > 1) return artikelPlural[posten] || posten;
      return artikelSingular[posten] || posten;
    }

    function updateIntroText() {
      var seen = {};
      var posten = [];
      document.querySelectorAll('.posten-select').forEach(function(sel) {
        var val = sel.value;
        if (!val || seen[val]) return;
        seen[val] = true;
        var row = sel.closest('.item-row');
        var qtyInput = row.querySelector('input[name="itemQty"]');
        var qty = qtyInput ? parseFloat(qtyInput.value) || 1 : 1;
        posten.push(getArtikel(val, qty));
      });
      var textarea = document.getElementById('introText');
      if (posten.length === 0) {
        textarea.value = '';
      } else if (posten.length === 1) {
        textarea.value = 'Gemäß unserer Vereinbarung berechnen wir Ihnen ' + posten[0] + '.';
      } else {
        var last = posten.pop();
        textarea.value = 'Gemäß unserer Vereinbarung berechnen wir Ihnen ' + posten.join(', ') + ' sowie ' + last + '.';
      }
    }

    // Event-Listener fuer bestehende Dropdowns
    function parseNum(s) {
      if (!s) return 0;
      return parseFloat(s.replace(',', '.')) || 0;
    }
    function formatEur(n) {
      return n.toFixed(2).replace('.', ',');
    }

    function syncPrices(row, source) {
      var qty = parseNum(row.querySelector('input[name="itemQty"]').value) || 1;
      var einzelInput = row.querySelector('.einzel-price');
      var gesamtInput = row.querySelector('.gesamt-price');
      if (source === 'einzel') {
        calcPrice(einzelInput);
        var einzel = parseNum(einzelInput.value);
        if (einzel > 0) gesamtInput.value = formatEur(einzel * qty);
      } else if (source === 'gesamt') {
        calcPrice(gesamtInput);
        var gesamt = parseNum(gesamtInput.value);
        if (gesamt > 0) {
          einzelInput.value = formatEur(gesamt / qty);
          gesamtInput.value = formatEur(gesamt);
        }
      } else if (source === 'qty') {
        var einzel2 = parseNum(einzelInput.value);
        if (einzel2 > 0) gesamtInput.value = formatEur(einzel2 * qty);
      }
      // required nur wenn beide leer
      einzelInput.required = !gesamtInput.value.trim();
    }

    function bindRow(row) {
      row.querySelector('.posten-select').addEventListener('change', function() { onPostenChange(this); });
      row.querySelector('input[name="itemQty"]').addEventListener('input', function() { syncPrices(row, 'qty'); updateIntroText(); });
      row.querySelector('.einzel-price').addEventListener('blur', function() { syncPrices(row, 'einzel'); });
      row.querySelector('.gesamt-price').addEventListener('blur', function() { syncPrices(row, 'gesamt'); });
      row.querySelector('.remove-item').addEventListener('click', function() { row.remove(); updateIntroText(); });
    }
    document.querySelectorAll('.item-row').forEach(function(row) { bindRow(row); });

    // Initiale USt-Anzeige setzen (bei vorbefuellten Zeilen)
    document.querySelectorAll('.posten-select').forEach(function(sel) {
      if (sel.value) onPostenChange(sel);
    });

    // Position hinzufuegen
    document.getElementById('addItem').addEventListener('click', function() {
      var container = document.getElementById('itemRows');
      var html = '<div class="item-row">' +
        '<div class="form-group" style="flex:3">' +
          '<select name="itemDesc" class="form-select posten-select" required>' +
            '<option value="">-- Posten wählen --</option>' +
            '<option value="Raummiete" data-tax="SAALMIETE">Raummiete</option>' +
            '<option value="Büffet" data-tax="BUEFFET">Büffet</option>' +
            '<option value="Getränke" data-tax="GETRAENKE">Getränke</option>' +
            '<option value="Softdrink (Cola, Fanta)" data-tax="GETRAENKE">Softdrink (Cola, Fanta)</option>' +
            '<option value="Tee" data-tax="GETRAENKE">Tee</option>' +
            '<option value="Kantinenspeise vegetarisch" data-tax="ESSEN">Kantinenspeise vegetarisch</option>' +
            '<option value="Kantinenspeise Fleisch" data-tax="ESSEN">Kantinenspeise Fleisch</option>' +
            '<option value="Butterbreze" data-tax="ESSEN">Butterbreze</option>' +
          '</select>' +
          '<input type="hidden" name="itemTaxType" value="">' +
        '</div>' +
        '<div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>' +
        '<div class="form-group" style="flex:1"><input type="text" name="itemPrice" class="form-input calc-price einzel-price" placeholder="Einzel" required></div>' +
        '<div class="form-group" style="flex:1"><input type="text" class="form-input calc-price gesamt-price" placeholder="Gesamt"></div>' +
        '<div class="form-group" style="flex:1"><span class="ust-display" style="display:inline-block;padding:8px 0;font-size:13px;color:var(--muted);">--</span></div>' +
        '<button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>' +
        '</div>';
      container.insertAdjacentHTML('beforeend', html);
      var rows = container.querySelectorAll('.item-row');
      bindRow(rows[rows.length - 1]);
    });

    // Einzeltag: Bei Von-Datum-Änderung Bis synchronisieren
    document.getElementById('servicePeriodFrom').addEventListener('change', function() {
      if (document.getElementById('singleDay').checked) {
        document.getElementById('servicePeriodTo').value = this.value;
      }
    });

    // Vor Submit: alle Preisfelder berechnen und Einzelpreis sicherstellen
    document.querySelector('form').addEventListener('submit', function() {
      document.querySelectorAll('.calc-price').forEach(function(input) { calcPrice(input); });
      document.querySelectorAll('.item-row').forEach(function(row) {
        var einzel = row.querySelector('.einzel-price');
        var gesamt = row.querySelector('.gesamt-price');
        if (einzel && gesamt && !parseNum(einzel.value) && parseNum(gesamt.value)) {
          syncPrices(row, 'gesamt');
        }
      });
    });

    // Default Fälligkeitsdatum: 14 Tage ab heute
    var due = new Date(); due.setDate(due.getDate() + 14);
    document.getElementById('dueDate').value = due.toISOString().split('T')[0];
  </script>
</body>
</html>
