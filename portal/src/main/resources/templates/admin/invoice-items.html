<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rechnung erstellen - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
  <style>
    .item-row { display: flex; gap: 12px; margin-bottom: 8px; align-items: flex-start; }
    .item-row .form-group { margin-bottom: 0; }
  </style>
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title" th:text="'Rechnung f&uuml;r ' + ${customer.fullName}">Rechnung f&uuml;r Max Mustermann</h1>
        <p class="portal-header__subtitle">Positionen und Rechnungsdetails eingeben</p>
      </div>

      <div class="detail-card" style="max-width:840px;">
        <div class="detail-card__title">Rechnungsdaten</div>
        <form th:action="@{/portal/admin/rechnung/preview}" method="post">
          <input type="hidden" name="customerId" th:value="${customer.id}">

          <div class="form-group">
            <label class="form-label" for="bookingId">Buchung (optional)</label>
            <select id="bookingId" name="bookingId" class="form-select">
              <option value="">Keine Buchung zuordnen</option>
              <option th:each="b : ${bookings}"
                      th:value="${b.id}"
                      th:text="'#' + ${b.id} + ' - ' + ${b.bookingType}">
                #1 - Hochzeit
              </option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Positionen</label>
            <div id="itemRows">
              <div class="item-row">
                <div class="form-group" style="flex:3"><input type="text" name="itemDesc" class="form-input" placeholder="Saalmiete" required></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required></div>
                <button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>
              </div>
              <div class="item-row">
                <div class="form-group" style="flex:3"><input type="text" name="itemDesc" class="form-input" placeholder="3-Gang-Men&uuml;" required></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required></div>
                <button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>
              </div>
              <div class="item-row">
                <div class="form-group" style="flex:3"><input type="text" name="itemDesc" class="form-input" placeholder="Getr&auml;nkepauschale" required></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>
                <div class="form-group" style="flex:1"><input type="number" name="itemPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required></div>
                <button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>
              </div>
            </div>
            <button type="button" id="addItem" class="btn btn--outline btn--sm" style="margin-top:8px;">Position hinzuf&uuml;gen</button>
          </div>

          <div style="display:flex; gap:12px;">
            <div class="form-group" style="flex:1">
              <label class="form-label" for="taxRate">MwSt.-Satz (%)</label>
              <input type="number" id="taxRate" name="taxRate" class="form-input" value="19.0" step="0.01" min="0" required>
            </div>
            <div class="form-group" style="flex:1">
              <label class="form-label" for="dueDate">F&auml;lligkeitsdatum</label>
              <input type="date" id="dueDate" name="dueDate" class="form-input" required>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="notes">Notizen</label>
            <textarea id="notes" name="notes" class="form-textarea" placeholder="Zus&auml;tzliche Hinweise zur Rechnung..."></textarea>
          </div>

          <div style="display:flex; gap:12px; margin-top:24px;">
            <button type="submit" class="btn btn--gold">Vorschau anzeigen</button>
            <a th:href="@{/portal/admin/rechnungen}" class="btn btn--outline">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
  <script>
    document.getElementById('addItem').addEventListener('click', function() {
      var container = document.getElementById('itemRows');
      var row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = '<div class="form-group" style="flex:3"><input type="text" name="itemDesc" class="form-input" placeholder="Beschreibung" required></div>' +
        '<div class="form-group" style="flex:1"><input type="number" name="itemQty" class="form-input" value="1" step="0.01" min="0.01"></div>' +
        '<div class="form-group" style="flex:1"><input type="number" name="itemPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required></div>' +
        '<button type="button" class="btn btn--danger btn--sm remove-item" style="align-self:center;">X</button>';
      container.appendChild(row);
      row.querySelector('.remove-item').addEventListener('click', function() { row.remove(); });
    });

    document.querySelectorAll('.remove-item').forEach(function(btn) {
      btn.addEventListener('click', function() { btn.closest('.item-row').remove(); });
    });
  </script>
</body>
</html>
