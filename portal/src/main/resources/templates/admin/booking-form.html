<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neue Buchung - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title">Neue Buchung</h1>
        <p class="portal-header__subtitle">Erstellen Sie eine neue Buchung für einen Kunden</p>
      </div>

      <div th:if="${#lists.isEmpty(customers)}" class="alert alert--info">
        Es gibt noch keine Kunden. <a th:href="@{/portal/admin/kunde/neu}">Legen Sie zuerst einen Kunden an.</a>
      </div>

      <div class="detail-card" style="max-width:720px;" th:if="${!#lists.isEmpty(customers)}">
        <div class="detail-card__title">Buchungsdaten</div>
        <form th:action="@{/portal/admin/buchung/neu}" method="post">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="customerId">Kunde *</label>
              <select id="customerId" name="customerId" class="form-select" required>
                <option value="">Kunde wählen...</option>
                <option th:each="c : ${customers}" th:value="${c.id}"
                        th:text="${c.fullName} + (${c.company != null ? ' (' + c.company + ')' : ''})">Kunde</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="bookingType">Buchungstyp *</label>
              <select id="bookingType" name="bookingType" class="form-select" required>
                <option th:each="t : ${bookingTypes}" th:value="${t.name()}" th:text="${t.label}">Typ</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="eventDate">Eventdatum</label>
              <input type="date" id="eventDate" name="eventDate" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label" for="eventTimeSlot">Zeitfenster</label>
              <select id="eventTimeSlot" name="eventTimeSlot" class="form-select">
                <option value="">Bitte wählen...</option>
                <option value="Vormittag (9-12 Uhr)">Vormittag (9-12 Uhr)</option>
                <option value="Mittag (12-15 Uhr)">Mittag (12-15 Uhr)</option>
                <option value="Nachmittag (15-18 Uhr)">Nachmittag (15-18 Uhr)</option>
                <option value="Abend (18-23 Uhr)">Abend (18-23 Uhr)</option>
                <option value="Ganztags">Ganztags</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="guestCount">Anzahl Gäste</label>
              <input type="number" id="guestCount" name="guestCount" class="form-input" min="1">
            </div>
            <div class="form-group">
              <label class="form-label" for="budget">Budget (EUR)</label>
              <input type="number" id="budget" name="budget" class="form-input" min="0" step="100">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="status">Status</label>
            <select id="status" name="status" class="form-select">
              <option th:each="s : ${bookingStatuses}" th:value="${s.name()}" th:text="${s.label}">Status</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="menuSelection">Menüwahl</label>
            <textarea id="menuSelection" name="menuSelection" class="form-textarea" placeholder="Gewünschte Speisen, Getränke..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="specialRequests">Besondere Wünsche</label>
            <textarea id="specialRequests" name="specialRequests" class="form-textarea" placeholder="Allergien, besondere Anforderungen..."></textarea>
          </div>

          <div class="form-group">
            <label class="form-label" for="adminNotes">Interne Notizen</label>
            <textarea id="adminNotes" name="adminNotes" class="form-textarea" placeholder="Nur für interne Verwendung..."></textarea>
          </div>

          <div style="display:flex; gap:12px; margin-top:24px;">
            <button type="submit" class="btn btn--gold">Buchung erstellen</button>
            <a th:href="@{/portal/admin/buchungen}" class="btn btn--outline">Abbrechen</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
