<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rechnungen - Elysee Events</title>
  <link rel="stylesheet" th:href="@{/portal/css/fonts.css}">
  <link rel="stylesheet" th:href="@{/portal/css/portal.css}">
</head>
<body>
  <div th:replace="~{fragments/admin-nav :: topnav}"></div>
  <div class="admin-layout">
    <div th:replace="~{fragments/admin-nav :: sidebar}"></div>
    <div class="admin-content">
      <div th:if="${message}" class="alert alert--success" th:text="${message}"></div>
      <div th:if="${error}" class="alert alert--error" th:text="${error}"></div>

      <div class="portal-header">
        <h1 class="portal-header__title">Rechnungen</h1>
        <p class="portal-header__subtitle" th:text="${#lists.size(invoices)} + ' Rechnungen'">0 Rechnungen</p>
        <div class="portal-header__actions">
          <a th:href="@{/portal/admin/rechnung/neu}" class="btn btn--gold">Neue Rechnung</a>
        </div>
      </div>

      <div class="filter-bar">
        <form th:action="@{/portal/admin/rechnungen}" method="get" style="display:flex; gap:12px; align-items:flex-end;">
          <div class="form-group">
            <label class="form-label">Suche</label>
            <input type="text" name="q" class="form-input" placeholder="Rechnungsnr., Kunde, Firma, Status..."
                   th:value="${searchQuery}">
          </div>
          <button type="submit" class="btn btn--outline btn--sm">Suchen</button>
        </form>
      </div>

      <div th:if="${#lists.isEmpty(invoices)}" class="empty-state">
        <div class="empty-state__title">Keine Rechnungen vorhanden</div>
        <div class="empty-state__text">Erstellen Sie eine neue Rechnung über den Button oben.</div>
      </div>

      <form th:action="@{/portal/admin/rechnungen}" method="post" style="display:none" id="csrfForm"></form>
      <div class="table-wrap" th:if="${!#lists.isEmpty(invoices)}">
        <table class="data-table">
          <thead>
            <tr>
              <th>Nr.</th>
              <th>Kunde</th>
              <th>Typ</th>
              <th>Netto</th>
              <th>Gesamt</th>
              <th>Fällig</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="inv : ${invoices}" th:data-href="@{/portal/admin/rechnung/{id}(id=${inv.id})}">
              <td th:text="${inv.invoiceNumber}">RE-001</td>
              <td th:text="${inv.customerName}">Max Mustermann</td>
              <td th:text="${inv.bookingTypeLabel}">Hochzeit</td>
              <td th:text="${#numbers.formatDecimal(inv.amount, 0, 'COMMA', 2, 'POINT')} + ' EUR'">1.000,00 EUR</td>
              <td th:text="${#numbers.formatDecimal(inv.total, 0, 'COMMA', 2, 'POINT')} + ' EUR'">1.190,00 EUR</td>
              <td th:text="${inv.dueDate != null ? @dateUtil.format(inv.dueDate) : '-'}">2024-07-01</td>
              <td onclick="event.stopPropagation()">
                <select class="status-select" th:classappend="'status-select--' + ${inv.status}"
                        th:data-url="@{/portal/admin/rechnung/{id}/status(id=${inv.id})}"
                        onchange="updateStatus(this)">
                  <option value="OFFEN" th:selected="${inv.status == 'OFFEN'}">Offen</option>
                  <option value="BEZAHLT" th:selected="${inv.status == 'BEZAHLT'}">Bezahlt</option>
                  <option value="UEBERFAELLIG" th:selected="${inv.status == 'UEBERFAELLIG'}">Überfällig</option>
                  <option value="MAHNUNG" th:selected="${inv.status == 'MAHNUNG'}">Mahnung</option>
                  <option value="STORNIERT" th:selected="${inv.status == 'STORNIERT'}">Storniert</option>
                </select>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
  <script th:src="@{/portal/js/portal.js}"></script>
</body>
</html>
