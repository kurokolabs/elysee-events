<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0; padding:0; background:#0a0804; font-family:Georgia,'Times New Roman',serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0a0804;">
    <tr><td align="center" style="padding:40px 16px;">
      <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px; width:100%;">

        <!-- BRAND -->
        <tr><td align="center" style="padding:0 0 40px 0;">
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:13px; font-style:italic; letter-spacing:.25em; color:rgba(201,168,76,.7);">ELYSEE EVENTS</div>
        </td></tr>

        <!-- DIVIDER -->
        <tr><td align="center" style="padding:0 0 48px 0;">
          <div style="width:40px; height:1px; background:rgba(201,168,76,.3);"></div>
        </td></tr>

        <!-- TITLE -->
        <tr><td align="center" style="padding:0 0 12px 0;">
          <h1 style="font-family:Georgia,'Times New Roman',serif; font-size:28px; font-weight:normal; color:#ffffff; margin:0;">Buchungs-Update</h1>
        </td></tr>

        <!-- BODY -->
        <tr><td align="center" style="padding:0 0 28px 0;">
          <p style="font-family:Georgia,'Times New Roman',serif; font-size:15px; color:rgba(255,255,255,.5); margin:0; line-height:1.8;">
            Ihre Buchung <strong style="color:rgba(255,255,255,.75);">#<span th:text="${bookingId}">[ID]</span></strong> hat einen neuen Status.
          </p>
        </td></tr>

        <!-- STATUS -->
        <tr><td align="center" style="padding:0 0 36px 0;">
          <div th:style="'display:inline-block; padding:10px 32px; font-family:Georgia,serif; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#ffffff; border:1px solid ' + ${statusColor} + '; background:' + ${statusColor}" style="display:inline-block; padding:10px 32px; font-family:Georgia,serif; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#ffffff; border:1px solid #C9A84C; background:#C9A84C;" th:text="${statusLabel}">[STATUS]</div>
        </td></tr>

        <!-- DETAILS -->
        <tr><td style="padding:0 0 36px 0;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.12em; text-transform:uppercase; width:100px; border-top:1px solid rgba(201,168,76,.1);">Typ</td>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(255,255,255,.6); border-top:1px solid rgba(201,168,76,.1);" th:text="${bookingType}">[Typ]</td>
            </tr>
            <tr>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.12em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.06);">Datum</td>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(255,255,255,.6); border-top:1px solid rgba(201,168,76,.06);" th:text="${eventDate}">[Datum]</td>
            </tr>
            <tr>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.12em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.06);">Zeit</td>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(255,255,255,.6); border-top:1px solid rgba(201,168,76,.06);" th:text="${timeSlot}">[Zeit]</td>
            </tr>
            <tr>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:11px; color:rgba(201,168,76,.45); letter-spacing:.12em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.06); border-bottom:1px solid rgba(201,168,76,.1);">Gaeste</td>
              <td style="padding:16px 0; font-family:Georgia,'Times New Roman',serif; font-size:14px; color:rgba(255,255,255,.6); border-top:1px solid rgba(201,168,76,.06); border-bottom:1px solid rgba(201,168,76,.1);" th:text="${guestCount}">[Anzahl]</td>
            </tr>
          </table>
        </td></tr>

        <!-- CTA -->
        <tr><td align="center" style="padding:0 0 56px 0;">
          <a th:href="${portalUrl}" href="#" style="display:inline-block; border:1px solid rgba(201,168,76,.4); color:#C9A84C; font-family:Georgia,'Times New Roman',serif; font-size:12px; text-decoration:none; padding:14px 36px; letter-spacing:.14em; text-transform:uppercase;">Details im Portal</a>
        </td></tr>

        <!-- DIVIDER -->
        <tr><td align="center" style="padding:0 0 32px 0;">
          <div style="width:40px; height:1px; background:rgba(201,168,76,.15);"></div>
        </td></tr>

        <!-- FOOTER -->
        <tr><td align="center">
          <p style="font-family:Georgia,'Times New Roman',serif; font-size:10px; color:rgba(255,255,255,.15); margin:0; line-height:2.2; letter-spacing:.04em;">
            Elysee Event GmbH &middot; Werner-von-Siemensstrasse 6 &middot; 86159 Augsburg<br>
            +49 176 30472811 &middot; verwaltung@elysee-events.de
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
