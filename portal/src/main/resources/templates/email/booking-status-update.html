<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0; padding:0; background:#F2EFE9; font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F2EFE9;">
    <tr><td align="center" style="padding:40px 16px;">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border:1px solid rgba(201,168,76,.15); border-radius:2px;">

        <!-- HEADER -->
        <tr><td align="center" style="padding:40px 48px 0 48px;">
          <div style="font-family:Georgia,'Times New Roman',serif; font-size:22px; font-weight:bold; color:#C9A84C; letter-spacing:.06em;">ELYSEE EVENTS</div>
        </td></tr>

        <tr><td style="padding:16px 48px 0 48px;"><div style="height:2px; background:#C9A84C;"></div></td></tr>

        <tr><td align="center" style="padding:32px 48px 8px 48px;">
          <h1 style="font-family:Georgia,'Times New Roman',serif; font-size:24px; font-weight:bold; color:#1A1A1A; margin:0;">Buchungs-Update</h1>
        </td></tr>

        <tr><td align="center" style="padding:0 48px 24px 48px;">
          <p style="font-size:14px; color:#1A1A1A; margin:0; line-height:1.8;">
            Ihre Buchung <strong>#<span th:text="${bookingId}">[ID]</span></strong> hat einen neuen Status.
          </p>
        </td></tr>

        <!-- STATUS -->
        <tr><td align="center" style="padding:0 48px 28px 48px;">
          <div th:style="'display:inline-block; padding:10px 32px; font-size:12px; font-weight:bold; letter-spacing:.14em; text-transform:uppercase; color:#ffffff; border-radius:4px; background:' + ${statusColor}" style="display:inline-block; padding:10px 32px; font-size:12px; font-weight:bold; letter-spacing:.14em; text-transform:uppercase; color:#ffffff; border-radius:4px; background:#C9A84C;" th:text="${statusLabel}">[STATUS]</div>
        </td></tr>

        <!-- DETAILS -->
        <tr><td style="padding:0 48px 28px 48px;">
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#F2EFE9; border-radius:4px;">
            <tr>
              <td style="padding:12px 20px; font-size:11px; color:#6B6560; letter-spacing:.1em; text-transform:uppercase; width:100px;">Typ</td>
              <td style="padding:12px 20px; font-size:14px; color:#1A1A1A;" th:text="${bookingType}">[Typ]</td>
            </tr>
            <tr>
              <td style="padding:12px 20px; font-size:11px; color:#6B6560; letter-spacing:.1em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.1);">Datum</td>
              <td style="padding:12px 20px; font-size:14px; color:#1A1A1A; border-top:1px solid rgba(201,168,76,.1);" th:text="${eventDate}">[Datum]</td>
            </tr>
            <tr>
              <td style="padding:12px 20px; font-size:11px; color:#6B6560; letter-spacing:.1em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.1);">Zeit</td>
              <td style="padding:12px 20px; font-size:14px; color:#1A1A1A; border-top:1px solid rgba(201,168,76,.1);" th:text="${timeSlot}">[Zeit]</td>
            </tr>
            <tr>
              <td style="padding:12px 20px; font-size:11px; color:#6B6560; letter-spacing:.1em; text-transform:uppercase; border-top:1px solid rgba(201,168,76,.1);">Gäste</td>
              <td style="padding:12px 20px; font-size:14px; color:#1A1A1A; border-top:1px solid rgba(201,168,76,.1);" th:text="${guestCount}">[Anzahl]</td>
            </tr>
          </table>
        </td></tr>

        <!-- CTA -->
        <tr><td align="center" style="padding:0 48px 40px 48px;">
          <a th:href="${portalUrl}" href="#" style="display:inline-block; background:#C9A84C; color:#ffffff; font-size:12px; font-weight:bold; text-decoration:none; padding:14px 36px; letter-spacing:.1em; text-transform:uppercase; border-radius:2px;">Details im Portal</a>
        </td></tr>

        <!-- FOOTER -->
        <tr><td style="padding:0 48px 32px 48px; border-top:1px solid #C9A84C;">
          <p style="font-size:10px; color:#6B6560; margin:16px 0 0 0; line-height:2; text-align:center; letter-spacing:.04em;">
            Elysee Event GmbH &middot; Werner-von-Siemensstrasse 6 &middot; 86159 Augsburg<br>
            +49 176 30472811 &middot; verwaltung@elysee-events.de
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
