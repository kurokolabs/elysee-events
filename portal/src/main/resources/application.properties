server.port=${SERVER_PORT:8080}

# SQLite (Standard/Entwicklung)
spring.datasource.url=jdbc:sqlite:${DB_PATH:./portal.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# Session
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Thymeleaf
spring.thymeleaf.cache=false

# Static resources - kein Browser-Cache im Dev
spring.web.resources.cache.cachecontrol.no-cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Multipart Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Admin
app.admin.email=${ADMIN_EMAIL:admin@elysee-events.de}
app.admin.password=${ADMIN_PASSWORD:Admin2024!}

# Uploads
app.upload.path=${UPLOAD_PATH:./uploads}

# EmailJS
app.emailjs.public-key=${EMAILJS_PUBLIC_KEY:YOUR_PUBLIC_KEY}
app.emailjs.service-id=${EMAILJS_SERVICE_ID:YOUR_SERVICE_ID}
app.emailjs.template-id=${EMAILJS_TEMPLATE_ID:YOUR_TEMPLATE_ID}
app.emailjs.confirm-template-id=${EMAILJS_CONFIRM_TEMPLATE_ID:YOUR_CONFIRM_TEMPLATE_ID}

# Firmendaten (für Rechnungen/Angebote/PDF)
app.company.name=${COMPANY_NAME:Elysee Event GmbH}
app.company.street=${COMPANY_STREET:Werner-von-Siemensstraße 6, Haus 12}
app.company.city=${COMPANY_CITY:86159 Augsburg}
app.company.phone=${COMPANY_PHONE:0821 555 0000}
app.company.email=${COMPANY_EMAIL:info@elysee-events.de}
app.company.web=${COMPANY_WEB:www.elysee-events.de}
app.company.tax-id=${COMPANY_TAX_ID:DE123456789}
app.company.hrb=${COMPANY_HRB:HRB 12345}
app.company.court=${COMPANY_COURT:Amtsgericht Augsburg}
app.company.bank=${COMPANY_BANK:Stadtsparkasse Augsburg}
app.company.iban=${COMPANY_IBAN:DE89 7205 0000 0000 1234 56}
app.company.bic=${COMPANY_BIC:AUGSDE77XXX}
app.company.ceo=${COMPANY_CEO:Aziza Furmoly}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
