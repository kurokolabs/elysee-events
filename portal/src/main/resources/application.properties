server.port=${SERVER_PORT:8080}
server.error.whitelabel.enabled=false

# SQLite (Standard/Entwicklung)
spring.datasource.url=jdbc:sqlite:${DB_PATH:./portal.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# Session
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Thymeleaf
spring.thymeleaf.cache=false

# Static resources - kein Browser-Cache im Dev
spring.web.resources.cache.cachecontrol.no-cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Multipart Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Admin
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# 2FA
app.2fa.hmac-secret=${TWO_FA_HMAC_SECRET:dev-only-hmac-secret}

# Uploads
app.upload.path=${UPLOAD_PATH:./uploads}

# EmailJS
app.emailjs.public-key=${EMAILJS_PUBLIC_KEY:YOUR_PUBLIC_KEY}
app.emailjs.service-id=${EMAILJS_SERVICE_ID:YOUR_SERVICE_ID}
app.emailjs.template-id=${EMAILJS_TEMPLATE_ID:YOUR_TEMPLATE_ID}
app.emailjs.confirm-template-id=${EMAILJS_CONFIRM_TEMPLATE_ID:YOUR_CONFIRM_TEMPLATE_ID}

# Firmendaten (für Rechnungen/Angebote/PDF)
app.company.name=${COMPANY_NAME:Elysee Event GmbH}
app.company.street=${COMPANY_STREET:Werner-von-Siemensstrasse 6}
app.company.city=${COMPANY_CITY:86159 Augsburg}
app.company.phone=${COMPANY_PHONE:+49 821 90798849}
app.company.email=${COMPANY_EMAIL:verwaltung@elysee-events.de}
app.company.web=${COMPANY_WEB:www.elysee-events.de}
app.company.tax-id=${COMPANY_TAX_ID:wird ausgestellt}
app.company.hrb=${COMPANY_HRB:wird ausgestellt}
app.company.court=${COMPANY_COURT:Amtsgericht Augsburg}
app.company.bank=${COMPANY_BANK:Sparkasse Freising Moosburg}
app.company.iban=${COMPANY_IBAN:DE71 7005 1003 0026 2013 84}
app.company.bic=${COMPANY_BIC:BYLADEM1FSI}
app.company.ceo=${COMPANY_CEO:Aziza Furmoly}

# SMTP (dev: localhost mailhog/mailpit)
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.from=${SMTP_FROM:noreply@elysee-events.de}

# Trusted Proxy
app.trusted-proxy=${TRUSTED_PROXY:127.0.0.1}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
