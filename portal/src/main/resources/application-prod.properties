# ── Produktion (MySQL auf Hostinger) ──────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elysee_portal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:elysee_portal}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.continue-on-error=true

# Proxy
server.forward-headers-strategy=native

# Session
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Thymeleaf
spring.thymeleaf.cache=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# SMTP (for 2FA codes)
spring.mail.host=${SMTP_HOST:smtp.hostinger.com}
spring.mail.port=${SMTP_PORT:465}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.from=${SMTP_FROM:verwaltung@elysee-events.de}

# Website static files
app.website.path=${WEBSITE_PATH:/app/elysee-events/}

# Logging
logging.file.name=${LOG_PATH:./logs/portal.log}
logging.level.root=WARN
logging.level.de.elyseeevents=INFO
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
