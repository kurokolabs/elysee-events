# ── Produktion (MySQL auf Hostinger) ──────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/elysee_portal?useSSL=true&serverTimezone=Europe/Berlin&characterEncoding=utf8mb4}
spring.datasource.username=${DB_USER:elysee_portal}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-mysql.sql
spring.sql.init.continue-on-error=true

# Session
server.servlet.session.cookie.secure=true

# Thymeleaf
spring.thymeleaf.cache=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.file.name=${LOG_PATH:./logs/portal.log}
logging.level.root=WARN
logging.level.de.elyseeevents=INFO
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
