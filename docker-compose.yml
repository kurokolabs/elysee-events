version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    security_opt:
      - no-new-privileges:true
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: elysee_portal
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./portal/src/main/resources/schema-mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SERVER_PORT:-8080}:8080"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=100M
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # DB-Verbindung mit TLS (MySQL 8 hat Server-seitige TLS out-of-box, self-signed).
      # sslMode=REQUIRED erzwingt TLS ohne CA-Verifikation - schuetzt gegen Credential-
      # Sniffing auf dem Docker-Host, vermeidet allowPublicKeyRetrieval komplett.
      # Fuer vollstaendigen MITM-Schutz spaeter auf VERIFY_CA + gemountetes CA-Zert upgraden.
      DB_URL: jdbc:mysql://db:3306/elysee_portal?sslMode=REQUIRED&serverTimezone=Europe/Berlin&characterEncoding=UTF-8
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      TWO_FA_HMAC_SECRET: ${TWO_FA_HMAC_SECRET}
      NEWSLETTER_TOKEN_PEPPER: ${NEWSLETTER_TOKEN_PEPPER}
      UPLOAD_PATH: /app/uploads
      WEBSITE_PATH: /app/elysee-events/
      LOG_PATH: /app/logs/portal.log
      COMPANY_NAME: ${COMPANY_NAME:-Elysee Event GmbH}
      COMPANY_STREET: ${COMPANY_STREET:-Werner-von-Siemensstrasse 6}
      COMPANY_CITY: ${COMPANY_CITY:-86159 Augsburg}
      COMPANY_PHONE: ${COMPANY_PHONE:-}
      COMPANY_EMAIL: ${COMPANY_EMAIL:-verwaltung@elysee-events.de}
      COMPANY_WEB: ${COMPANY_WEB:-www.elysee-events.de}
      COMPANY_TAX_ID: ${COMPANY_TAX_ID:-}
      COMPANY_HRB: ${COMPANY_HRB:-}
      COMPANY_COURT: ${COMPANY_COURT:-Amtsgericht Augsburg}
      COMPANY_BANK: ${COMPANY_BANK:-}
      COMPANY_IBAN: ${COMPANY_IBAN:-DE71 7005 1003 0026 2013 84}
      COMPANY_BIC: ${COMPANY_BIC:-BYLADEM1FSI}
      COMPANY_CEO: ${COMPANY_CEO:-Aziza Furmoly}
      EMAILJS_PUBLIC_KEY: ${EMAILJS_PUBLIC_KEY:-YOUR_PUBLIC_KEY}
      EMAILJS_SERVICE_ID: ${EMAILJS_SERVICE_ID:-YOUR_SERVICE_ID}
      EMAILJS_TEMPLATE_ID: ${EMAILJS_TEMPLATE_ID:-YOUR_TEMPLATE_ID}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM:-verwaltung@elysee-events.de}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs

volumes:
  mysql_data:
  uploads_data:
  logs_data:
