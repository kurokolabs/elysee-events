<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B455"/>
      <stop offset="100%" stop-color="#B8943F"/>
    </linearGradient>
  </defs>
  <!-- Rounded dark background -->
  <rect width="32" height="32" rx="6" fill="#1A1A1A"/>
  <!-- Thin gold inner border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="5" fill="none" stroke="#C9A84C" stroke-width="0.6" opacity="0.4"/>
  <!-- Decorative top arc -->
  <path d="M10,5.5 Q16,3 22,5.5" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.35"/>
  <!-- Main letter -->
  <text x="16" y="23.5" font-family="Georgia, 'Times New Roman', serif"
        font-size="21" font-weight="700" fill="url(#g)" text-anchor="middle"
        letter-spacing="0">&#201;</text>
  <!-- Small decorative dot below -->
  <circle cx="16" cy="27.5" r="0.8" fill="#C9A84C" opacity="0.45"/>
